<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>帝国时代放置版</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); color: #fff; font-family: 'Noto Serif SC', sans-serif; min-height: 100vh; min-height: 100dvh; overflow: hidden; }
.btn { background: linear-gradient(180deg, #4f46e5 0%, #3730a3 100%); border: none; border-radius: 12px; color: white; padding: 14px 20px; font-weight: bold; cursor: pointer; font-size: 14px; min-height: 50px; box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4); transition: transform 0.1s; }
.btn:active { transform: scale(0.95); }
.btn:disabled { background: #374151; color: #9ca3af; box-shadow: none; }
.btn-green { background: linear-gradient(180deg, #10b981 0%, #059669 100%); }
.btn-yellow { background: linear-gradient(180deg, #f59e0b 0%, #d97706 100%); }
.btn-red { background: linear-gradient(180deg, #ef4444 0%, #dc2626 100%); }
.card { background: rgba(31, 41, 55, 0.8); border-radius: 16px; padding: 16px; }
.popup { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 100; }
.popup-content { background: #1f2937; border: 3px solid #fbbf24; border-radius: 20px; padding: 32px; max-width: 90vw; text-align: center; }
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #7c3aed; padding: 12px 24px; border-radius: 12px; font-weight: bold; animation: slide 0.3s; z-index: 50; }
@keyframes slide { from { transform: translateX(-50%) translateY(-20px); opacity: 0; } }
.progress { height: 8px; background: #374151; border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #10b981, #34d399); transition: width 0.5s; }
.battle-area { background: linear-gradient(180deg, #1f2937 0%, #111827 100%); border-radius: 16px; padding: 20px; margin: 12px; min-height: 120px; }
.unit { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 50%; margin: 2px; font-size: 16px; }
.unit-player { background: #3b82f6; }
.unit-enemy { background: #ef4444; }
</style>
</head>
<body class="p-4">
<!-- 菜单 -->
<div id="menuScreen" class="flex flex-col items-center justify-center min-h-[80vh] gap-6">
    <div class="text-center">
        <h1 class="text-5xl font-black text-yellow-400 mb-2">⚔️ 帝国时代</h1>
        <p class="text-gray-400">放置版</p>
    </div>
    <div class="w-full max-w-sm space-y-4">
        <div>
            <p class="text-yellow-400 text-sm mb-2">🏰 选择文明</p>
            <div class="grid grid-cols-2 gap-3" id="civList"></div>
        </div>
        <button class="btn btn-yellow w-full text-lg" onclick="startGame()" id="startBtn" disabled>开始游戏</button>
    </div>
</div>

<!-- 游戏 -->
<div id="gameScreen" class="hidden space-y-4">
    <!-- 顶部 -->
    <div class="flex justify-between items-center">
        <div class="flex items-center gap-2">
            <span id="civName" class="text-yellow-400 font-bold">-</span>
            <span class="bg-purple-600 px-2 py-1 rounded-full text-xs" id="ageDisplay">黑暗</span>
        </div>
        <div class="text-sm text-gray-400">⏱️ <span id="gameTime">00:00</span></div>
    </div>
    
    <!-- 资源 -->
    <div class="card flex justify-around text-center">
        <div><span class="text-xl">🔴</span><div class="text-2xl font-bold" id="resFood">150</div><div class="text-xs text-gray-500">食物</div></div>
        <div><span class="text-xl">🟤</span><div class="text-2xl font-bold" id="resWood">50</div><div class="text-xs text-gray-500">木材</div></div>
        <div><span class="text-xl">🟡</span><div class="text-2xl font-bold" id="resGold">50</div><div class="text-xs text-gray-500">黄金</div></div>
        <div><span class="text-xl">⚪</span><div class="text-2xl font-bold" id="resStone">0</div><div class="text-xs text-gray-500">石头</div></div>
    </div>
    
    <!-- 人口 -->
    <div class="flex items-center gap-4 px-2">
        <span class="text-sm">👥 <span id="popDisplay">5/10</span></span>
        <div class="progress flex-1"><div class="progress-fill" id="popBar" style="width: 50%"></div></div>
        <span class="text-xs text-gray-400" id="workerInfo">👨‍🌾 5采集</span>
    </div>
    
    <!-- 采集分配 -->
    <div class="card">
        <p class="text-yellow-400 text-sm mb-2">👨‍🌾 村民分配 (点击切换)</p>
        <div class="flex gap-2 text-sm">
            <button class="btn flex-1 py-2" onclick="setGather('food')" id="btnFood">🔴 食物 <span id="cntFood">5</span></button>
            <button class="btn flex-1 py-2" onclick="setGather('wood')" id="btnWood">🟤 木材 <span id="cntWood">0</span></button>
            <button class="btn flex-1 py-2" onclick="setGather('gold')" id="btnGold">🟡 黄金 <span id="cntGold">0</span></button>
        </div>
    </div>
    
    <!-- 战斗 -->
    <div class="battle-area">
        <div class="flex justify-between items-center mb-3">
            <div class="text-blue-400">我军: <span id="myPower">0</span></div>
            <div class="text-yellow-400 font-bold text-lg">VS</div>
            <div class="text-red-400">敌军: <span id="enemyPower">0</span></div>
        </div>
        <div class="flex justify-center gap-1 mb-3" id="battleUnits"></div>
        <div class="text-xs text-gray-400 mb-1">敌方基地: <span id="enemyHp">100</span>%</div>
        <div class="progress"><div class="progress-fill bg-red-500" id="enemyBar" style="width: 100%"></div></div>
        <div class="text-center text-xs text-gray-400 mt-2">第 <span id="waveNum" class="text-yellow-400">0</span> 波 · <span id="waveTimer">3:00</span></div>
    </div>
    
    <!-- 操作 -->
    <div class="space-y-2">
        <div class="flex gap-2">
            <button class="btn flex-1" onclick="trainVillager()">👨‍🌾 造村民 (50🔴)</button>
            <button class="btn" onclick="upgradeAge()">⬆️ 升级</button>
        </div>
        <div class="flex gap-2">
            <button class="btn flex-1" onclick="build('house')">🏠 住房 (30🟤)</button>
            <button class="btn flex-1" onclick="build('barracks')">⚔️ 兵营 (100🟤)</button>
        </div>
        <div class="flex gap-2">
            <button class="btn flex-1" onclick="train('infantry')" id="btnInfantry" disabled>🗡️ 步兵 (40🔴)</button>
            <button class="btn flex-1" onclick="train('archer')" id="btnArcher" disabled>🏹 弓兵 (30🔴)</button>
            <button class="btn flex-1" onclick="train('cavalry')" id="btnCavalry" disabled>🐎 骑兵 (60🔴)</button>
        </div>
        <button class="btn btn-red w-full text-lg" onclick="attack()">⚔️ 发起进攻!</button>
    </div>
</div>

<!-- 弹窗 -->
<div id="popup" class="popup hidden">
    <div class="popup-content">
        <h2 id="popupTitle" class="text-3xl font-black text-yellow-400 mb-4">胜利!</h2>
        <p id="popupDesc" class="text-gray-300 mb-6">恭喜!</p>
        <button class="btn btn-yellow" onclick="backToMenu()">再来一局</button>
    </div>
</div>

<div id="toast" class="toast hidden"></div>

<script>
const CIVS = {
    english: { name: '英格兰', icon: '🏰', bonus: '全+10%' },
    french: { name: '法兰西', icon: '👑', bonus: '骑兵+20%' },
    mongols: { name: '蒙古', icon: '🏹', bonus: '黄金+20%' },
    chinese: { name: '中国', icon: '🐉', bonus: '村民+15%' }
};

const AGES = ['黑暗', '封建', '城堡', '帝王'];
const AGE_COST = [{ food: 400, gold: 200 }, { food: 800, gold: 400 }, { food: 1600, gold: 800 }];
const UNIT_STATS = {
    villager: { cost: { food: 50 }, power: 2, icon: '👨‍🌾' },
    infantry: { cost: { food: 40, wood: 20 }, power: 8, icon: '🗡️' },
    archer: { cost: { food: 30, wood: 30 }, power: 10, icon: '🏹' },
    cavalry: { cost: { food: 60, gold: 40 }, power: 18, icon: '🐎' }
};

let game = { civ: null, age: 0, time: 0, resources: { food: 150, wood: 50, gold: 50, stone: 0 }, pop: { current: 5, max: 10 }, gather: { food: 5, wood: 0, gold: 0 }, wave: 0, waveTimer: 180, enemyHp: 100, enemyLevel: 1, units: [], buildings: { house: 0, barracks: 0 }, loop: null };

function initMenu() {
    document.getElementById('civList').innerHTML = Object.entries(CIVS).map(([id, c]) => 
        `<div class="card cursor-pointer text-center border-2 border-transparent hover:border-yellow-400" onclick="selectCiv('${id}')" id="civ-${id}">
            <div class="text-4xl mb-1">${c.icon}</div>
            <div class="font-bold text-yellow-400">${c.name}</div>
            <div class="text-xs text-gray-400">${c.bonus}</div>
        </div>`
    ).join('');
}

function selectCiv(id) {
    game.civ = CIVS[id];
    document.querySelectorAll('#civList > div').forEach(d => d.classList.remove('border-yellow-400', 'bg-gray-700'));
    document.getElementById('civ-' + id).classList.add('border-yellow-400', 'bg-gray-700');
    document.getElementById('startBtn').disabled = false;
}

function startGame() {
    if (!game.civ) return;
    game = { civ: game.civ, age: 0, time: 0, resources: { food: 150, wood: 50, gold: 50, stone: 0 }, pop: { current: 5, max: 10 }, gather: { food: 5, wood: 0, gold: 0 }, wave: 0, waveTimer: 180, enemyHp: 100, enemyLevel: 1, units: Array(5).fill(null).map(() => ({ type: 'villager', level: 1 })), buildings: { house: 0, barracks: 0 }, loop: null };
    document.getElementById('menuScreen').classList.add('hidden');
    document.getElementById('gameScreen').classList.remove('hidden');
    if (game.loop) clearInterval(game.loop);
    game.loop = setInterval(gameLoop, 1000);
    updateUI();
}

function setGather(type) {
    if (game.gather[type] >= game.pop.current) return;
    // 减少其他类型的村民
    for (let k in game.gather) {
        if (k !== type && game.gather[k] > 0) {
            game.gather[k]--;
            game.gather[type]++;
            break;
        }
    }
    updateGatherButtons();
    showToast(`👨‍🌾 切换到采集${type === 'food' ? '食物' : type === 'wood' ? '木材' : '黄金'}`);
}

function updateGatherButtons() {
    document.getElementById('cntFood').textContent = game.gather.food;
    document.getElementById('cntWood').textContent = game.gather.wood;
    document.getElementById('cntGold').textContent = game.gather.gold;
    document.getElementById('workerInfo').textContent = `👨‍🌾 ${game.pop.current}采集中`;
    
    ['food', 'wood', 'gold'].forEach(t => {
        const btn = document.getElementById('btn' + t.charAt(0).toUpperCase() + t.slice(1));
        if (game.gather[t] >= game.pop.current) btn.classList.add('opacity-50');
        else btn.classList.remove('opacity-50');
    });
}

function gameLoop() {
    game.time++;
    const bonus = game.civ.name === 'chinese' ? 1.15 : game.civ.name === 'english' ? 1.1 : 1;
    const totalGather = game.gather.food + game.gather.wood + game.gather.gold;
    const gatherRate = totalGather > 0 ? 3 * bonus : 0;
    
    if (game.gather.food > 0) game.resources.food += gatherRate * (game.gather.food / totalGather);
    if (game.gather.wood > 0) game.resources.wood += gatherRate * (game.gather.wood / totalGather);
    if (game.gather.gold > 0) {
        game.resources.gold += gatherRate * (game.gather.gold / totalGather) * (game.civ.name === 'mongols' ? 1.2 : 1);
    }
    
    game.waveTimer--;
    if (game.waveTimer <= 0) {
        game.wave++;
        game.waveTimer = Math.max(60, 180 - game.wave * 5);
        spawnWave();
    }
    
    autoBattle();
    updateUI();
}

function autoBattle() {
    const soldiers = game.units.filter(u => u.type !== 'villager');
    const myPower = soldiers.reduce((sum, u) => sum + getPower(u), 0);
    if (myPower > 0 && game.enemyHp > 0) {
        game.enemyHp -= Math.floor(myPower * 0.05);
        if (game.enemyHp <= 0) {
            game.enemyLevel++;
            game.enemyHp = 80 + game.enemyLevel * 40;
            game.resources.food += 200;
            game.resources.gold += 100;
            showToast('🎉 进攻成功!');
            if (game.enemyLevel >= 5) showPopup('胜利!', '恭喜通关!');
        }
    }
}

function getPower(u) { return UNIT_STATS[u.type].power * (1 + (u.level - 1) * 0.2); }

function spawnWave() {
    const enemyPower = Math.floor(game.wave * 12);
    const myPower = game.units.filter(u => u.type !== 'villager').reduce((sum, u) => sum + getPower(u), 0);
    showToast(`💀 第${game.wave}波来袭!`);
    if (myPower < enemyPower) {
        game.resources.food = Math.max(0, game.resources.food - 150);
        game.resources.wood = Math.max(0, game.resources.wood - 100);
        showToast('❌ 防守失败!');
    } else {
        showToast('✅ 防守成功!');
    }
}

function trainVillager() {
    if (game.resources.food < 50) { showToast('🔴 食物不足!'); return; }
    if (game.pop.current >= game.pop.max) { showToast('👥 人口满了!'); return; }
    game.resources.food -= 50;
    game.pop.current++;
    game.gather.food++;
    game.units.push({ type: 'villager', level: 1 });
    updateGatherButtons();
    updateUI();
}

function train(type) {
    const cost = UNIT_STATS[type].cost;
    if ((cost.food && game.resources.food < cost.food) || (cost.wood && game.resources.wood < cost.wood) || (cost.gold && game.resources.gold < cost.gold)) { showToast('❌ 资源不足!'); return; }
    if (game.pop.current >= game.pop.max) { showToast('👥 人口满了!'); return; }
    if (cost.food) game.resources.food -= cost.food;
    if (cost.wood) game.resources.wood -= cost.wood;
    if (cost.gold) game.resources.gold -= cost.gold;
    game.pop.current++;
    game.units.push({ type: type, level: 1 });
    showToast(`${UNIT_STATS[type].icon} ${type}+1`);
    updateUI();
}

function build(type) {
    if (type === 'house') {
        if (game.resources.wood < 30) { showToast('🟤 木材不足!'); return; }
        game.resources.wood -= 30;
        game.pop.max += 10;
        showToast('🏠 住房+1');
    } else if (type === 'barracks') {
        if (game.resources.wood < 100) { showToast('🟤 木材不足!'); return; }
        game.resources.wood -= 100;
        game.buildings.barracks++;
        showToast('⚔️ 兵营+1');
    }
    updateUI();
}

function upgradeAge() {
    if (game.age >= 3) return;
    const cost = AGE_COST[game.age];
    if (game.resources.food < cost.food || game.resources.gold < cost.gold) { showToast('❌ 资源不足!'); return; }
    game.resources.food -= cost.food;
    game.resources.gold -= cost.gold;
    game.age++;
    showToast(`⬆️ 进入${AGES[game.age]}!`);
    updateUI();
}

function attack() {
    const soldiers = game.units.filter(u => u.type !== 'villager');
    if (soldiers.length === 0) { showToast('❌ 没有军队!'); return; }
    const myPower = soldiers.reduce((sum, u) => sum + getPower(u), 0);
    const damage = Math.floor(myPower * 0.5);
    game.enemyHp -= damage;
    showToast(`⚔️ 进攻! 造成 ${damage} 伤害!`);
    if (game.enemyHp <= 0) {
        game.enemyLevel++;
        game.enemyHp = 80 + game.enemyLevel * 40;
        game.resources.food += 300;
        game.resources.gold += 200;
        showToast('🎉 摧毁敌方基地!');
        if (game.enemyLevel >= 5) showPopup('胜利!', '恭喜通关!');
    }
    updateUI();
}

function updateUI() {
    document.getElementById('civName').textContent = game.civ?.name || '-';
    document.getElementById('ageDisplay').textContent = AGES[game.age];
    document.getElementById('gameTime').textContent = formatTime(game.time);
    document.getElementById('resFood').textContent = Math.floor(game.resources.food);
    document.getElementById('resWood').textContent = Math.floor(game.resources.wood);
    document.getElementById('resGold').textContent = Math.floor(game.resources.gold);
    document.getElementById('resStone').textContent = Math.floor(game.resources.stone);
    document.getElementById('popDisplay').textContent = game.pop.current + '/' + game.pop.max;
    document.getElementById('popBar').style.width = (game.pop.current / game.pop.max * 100) + '%';
    
    const soldiers = game.units.filter(u => u.type !== 'villager');
    const myPower = soldiers.reduce((sum, u) => sum + getPower(u), 0);
    document.getElementById('myPower').textContent = myPower;
    document.getElementById('enemyPower').textContent = Math.floor(game.wave * 12);
    document.getElementById('enemyHp').textContent = Math.max(0, game.enemyHp);
    document.getElementById('enemyBar').style.width = Math.max(0, game.enemyHp) + '%';
    document.getElementById('waveNum').textContent = game.wave;
    document.getElementById('waveTimer').textContent = formatTime(game.waveTimer);
    
    document.getElementById('battleUnits').innerHTML = 
        game.units.slice(0, 10).map(u => `<div class="unit unit-player">${UNIT_STATS[u.type].icon}</div>`).join('') +
        Array(Math.min(game.wave, 10)).fill(0).map(() => `<div class="unit unit-enemy">💀</div>`).join('');
    
    document.getElementById('btnInfantry').disabled = !game.buildings.barracks || game.age < 1;
    document.getElementById('btnArcher').disabled = game.age < 1;
    document.getElementById('btnCavalry').disabled = game.age < 2;
    
    updateGatherButtons();
}

function formatTime(s) { return Math.floor(s / 60).toString().padStart(2, '0') + ':' + (s % 60).toString().padStart(2, '0'); }
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.remove('hidden'); setTimeout(() => t.classList.add('hidden'), 2500); }
function showPopup(title, desc) { document.getElementById('popupTitle').textContent = title; document.getElementById('popupDesc').textContent = desc; document.getElementById('popup').classList.remove('hidden'); if (game.loop) clearInterval(game.loop); }
function backToMenu() { document.getElementById('popup').classList.add('hidden'); document.getElementById('gameScreen').classList.add('hidden'); document.getElementById('menuScreen').classList.remove('hidden'); if (game.loop) clearInterval(game.loop); }

initMenu();
</script>
</body>
</html>
