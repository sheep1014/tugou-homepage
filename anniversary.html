<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Emoji 😎 3D</title>
  <style>
    body { margin: 0; background: #1a1a1a; overflow: hidden; }
    #info {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-family: sans-serif;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="info">
    <h2>😎 Cool Emoji 3D</h2>
    <p>Click to download STL | Drag to rotate</p>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/STLExporter.js"></script>
  <script>
    // Scene
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a);
    
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 120);
    
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    
    // Lights
    const ambient = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambient);
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(50, 50, 50);
    scene.add(light);
    const light2 = new THREE.DirectionalLight(0xffffff, 0.5);
    light2.position.set(-50, -50, -50);
    scene.add(light2);
    
    // Emoji group
    const emoji = new THREE.Group();
    
    // Face - yellow sphere
    const faceGeo = new THREE.SphereGeometry(40, 32, 32);
    const faceMat = new THREE.MeshPhongMaterial({ color: 0xffdd00, shininess: 30 });
    const face = new THREE.Mesh(faceGeo, faceMat);
    emoji.add(face);
    
    // Sunglasses
    const glassMat = new THREE.MeshPhongMaterial({ color: 0x111111, shininess: 100 });
    
    // Left lens
    const leftLensGeo = new THREE.BoxGeometry(25, 15, 3);
    const leftLens = new THREE.Mesh(leftLensGeo, glassMat);
    leftLens.position.set(-15, 5, 38);
    emoji.add(leftLens);
    
    // Right lens
    const rightLens = new THREE.Mesh(leftLensGeo, glassMat);
    rightLens.position.set(15, 5, 38);
    emoji.add(rightLens);
    
    // Bridge
    const bridgeGeo = new THREE.BoxGeometry(8, 3, 3);
    const bridge = new THREE.Mesh(bridgeGeo, glassMat);
    bridge.position.set(0, 5, 40);
    emoji.add(bridge);
    
    // Smile
    const smileMat = new THREE.MeshPhongMaterial({ color: 0x8B4513 });
    const smileGroup = new THREE.Group();
    
    // Smile arc using torus segments
    for (let i = 0; i < 8; i++) {
      const angle = (i / 7) * Math.PI;
      const x = Math.cos(angle) * 20 - 20;
      const y = Math.sin(angle) * 8 - 15;
      const toothGeo = new THREE.BoxGeometry(4, 4, 3);
      const tooth = new THREE.Mesh(toothGeo, smileMat);
      tooth.position.set(x, y, 40);
      smileGroup.add(tooth);
    }
    emoji.add(smileGroup);
    
    // Blush
    const blushMat = new THREE.MeshPhongMaterial({ color: 0xffaaaa, transparent: true, opacity: 0.6 });
    const blushGeo = new THREE.CircleGeometry(6, 16);
    
    const leftBlush = new THREE.Mesh(blushGeo, blushMat);
    leftBlush.position.set(-28, -8, 38);
    leftBlush.rotation.y = -0.3;
    emoji.add(leftBlush);
    
    const rightBlush = new THREE.Mesh(blushGeo, blushMat);
    rightBlush.position.set(28, -8, 38);
    rightBlush.rotation.y = 0.3;
    emoji.add(rightBlush);
    
    scene.add(emoji);
    
    // Auto rotate
    let isDragging = false;
    let previousMousePosition = { x: 0, y: 0 };
    
    renderer.domElement.addEventListener('mousedown', (e) => {
      isDragging = true;
      previousMousePosition = { x: e.clientX, y: e.clientY };
    });
    
    renderer.domElement.addEventListener('mouseup', () => isDragging = false);
    renderer.domElement.addEventListener('mousemove', (e) => {
      if (isDragging) {
        const deltaX = e.clientX - previousMousePosition.x;
        emoji.rotation.y += deltaX * 0.01;
        previousMousePosition = { x: e.clientX, y: e.clientY };
      }
    });
    
    // Click to download STL
    renderer.domElement.addEventListener('click', (e) => {
      if (Math.abs(e.clientX - previousMousePosition.x) < 5) {
        const exporter = new THREE.STLExporter();
        const result = exporter.parse(emoji);
        const blob = new Blob([result], { type: 'application/octet-stream' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'emoji_cool.stl';
        a.click();
        URL.revokeObjectURL(url);
      }
    });
    
    function animate() {
      requestAnimationFrame(animate);
      if (!isDragging) {
        emoji.rotation.y += 0.005;
      }
      renderer.render(scene, camera);
    }
    animate();
    
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
