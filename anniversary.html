<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>七周年</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #080808;
      background: radial-gradient(ellipse at 50% 30%, #151010 0%, #080808 50%, #030303 100%);
      overflow: hidden;
      font-family: 'Times New Roman', serif;
    }

    #canvas-container {
      position: relative;
      width: 100%;
      height: 72vh;
      cursor: pointer;
    }

    .hint {
      position: absolute;
      top: 52%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #2a2a2a;
      font-size: 9px;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 1s ease;
      pointer-events: none;
      font-family: 'Courier New', monospace;
    }

    #canvas-container:hover .hint {
      opacity: 1;
    }

    .date {
      position: absolute;
      bottom: 16%;
      font-size: 14px;
      font-weight: 300;
      color: #5a4a3a;
      letter-spacing: 6px;
    }

    .years {
      position: absolute;
      bottom: 10%;
      font-size: 9px;
      color: #3a3a3a;
      letter-spacing: 4px;
    }
  </style>
</head>
<body>
  <div id="canvas-container">
    <div class="hint">tap to bloom</div>
  </div>
  <div class="date">2019.3.3 — 2026.3.3</div>
  <div class="years">SEVEN YEARS</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // Scene setup
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(55, container.clientWidth / container.clientHeight, 0.01, 1000);
    camera.position.z = 3.5;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    // Subtle lighting
    const ambientLight = new THREE.AmbientLight(0x151010, 1.5);
    scene.add(ambientLight);

    const spotLight = new THREE.SpotLight(0xff2030, 3, 20, Math.PI / 4, 0.5);
    spotLight.position.set(0, 3, 4);
    spotLight.target.position.set(0, 0, 0);
    scene.add(spotLight);
    scene.add(spotLight.target);

    const fillLight = new THREE.PointLight(0x300808, 1.5, 15);
    fillLight.position.set(-3, 0, 2);
    scene.add(fillLight);

    // Rose particle system
    let roseParticles;
    let particleData = [];
    let blooming = false;
    let bloomTarget = 0;
    let bloomCurrent = 0;

    // Generate elegant rose shape
    function generateRose() {
      const points = [];
      
      // === FLOWER HEAD (多层花瓣) ===
      
      // 花心 - 紧密的螺旋
      for (let i = 0; i < 200; i++) {
        const t = i / 200;
        const angle = t * Math.PI * 8;
        const r = t * 0.12;
        const x = Math.cos(angle) * r;
        const z = Math.sin(angle) * r;
        const y = t * 0.08;
        
        points.push({
          x: x, y: y + 0.35, z: z,
          ox: x, oy: y + 0.35, oz: z,
          layer: 'heart',
          size: 0.012 + Math.random() * 0.008
        });
      }

      // 内层花瓣
      for (let i = 0; i < 600; i++) {
        const u = Math.random() * Math.PI * 2;
        const v = Math.random();
        
        // 花瓣形状 - 更紧密的玫瑰花瓣
        const petalR = 0.15 * Math.pow(1 - v * 0.7, 1.5);
        const petalY = 0.35 + v * 0.35;
        
        // 添加波浪纹理
        const wave = Math.sin(u * 5) * 0.02;
        
        const x = petalR * Math.cos(u) * (1 + wave);
        const z = petalR * Math.sin(u) * (1 + wave);
        
        points.push({
          x: x, y: petalY, z: z,
          ox: x, oy: petalY, oz: z,
          layer: 'inner',
          size: 0.015 + Math.random() * 0.01
        });
      }

      // 外层花瓣 - 更大的展开
      for (let i = 0; i < 900; i++) {
        const u = Math.random() * Math.PI * 2;
        const v = Math.random();
        
        const petalR = 0.2 + v * 0.25;
        const petalY = 0.3 + v * 0.3;
        
        const wave = Math.sin(u * 4 + v * 2) * 0.025;
        
        const x = petalR * Math.cos(u) * (1 + wave);
        const z = petalR * Math.sin(u) * (1 + wave);
        
        points.push({
          x: x, y: petalY, z: z,
          ox: x, oy: petalY, oz: z,
          layer: 'outer',
          size: 0.018 + Math.random() * 0.012
        });
      }

      // 最外层花瓣 - 轻微外翻
      for (let i = 0; i < 500; i++) {
        const u = Math.random() * Math.PI * 2;
        const v = Math.random();
        
        const petalR = 0.35 + v * 0.2;
        const petalY = 0.25 + v * 0.25;
        const curl = v * 0.1;
        
        const wave = Math.sin(u * 3) * 0.03;
        
        const x = petalR * Math.cos(u) * (1 + wave) + curl * Math.cos(u);
        const z = petalR * Math.sin(u) * (1 + wave) + curl * Math.sin(u);
        
        points.push({
          x: x, y: petalY, z: z,
          ox: x, oy: petalY, oz: z,
          layer: 'outermost',
          size: 0.02 + Math.random() * 0.015
        });
      }

      // === STEM (茎) ===
      for (let i = 0; i < 300; i++) {
        const t = Math.random();
        const y = -t * 1.8;
        const angle = Math.random() * Math.PI * 2;
        const r = 0.02 + Math.sin(t * 10) * 0.01;
        
        points.push({
          x: Math.cos(angle) * r,
          y: y,
          z: Math.sin(angle) * r,
          ox: Math.cos(angle) * r,
          oy: y,
          oz: Math.sin(angle) * r,
          layer: 'stem',
          size: 0.01 + Math.random() * 0.008
        });
      }

      // === LEAVES (叶子) ===
      const leafPositions = [
        { y: -0.4, side: 1, angle: 0.3 },
        { y: -0.7, side: -1, angle: -0.4 },
        { y: -1.0, side: 1, angle: 0.2 }
      ];

      leafPositions.forEach(lp => {
        for (let i = 0; i < 120; i++) {
          const t = Math.random();
          const x = lp.side * (t * 0.5);
          const y = lp.y - t * 0.3;
          const z = Math.sin(t * Math.PI) * 0.08 * (1 - t * 0.5);
          
          const wobble = (Math.random() - 0.5) * 0.02;
          
          points.push({
            x: x + wobble,
            y: y,
            z: z + wobble,
            ox: x + wobble,
            oy: y,
            oz: z + wobble,
            layer: 'leaf',
            size: 0.015 + Math.random() * 0.01
          });
        }
      });

      return points;
    }

    // Create particle system
    function createRose() {
      particleData = generateRose();
      
      const geometry = new THREE.BufferGeometry();
      const positions = new Float32Array(particleData.length * 3);
      const colors = new Float32Array(particleData.length * 3);
      const sizes = new Float32Array(particleData.length);

      particleData.forEach((p, i) => {
        positions[i * 3] = p.x;
        positions[i * 3 + 1] = p.y;
        positions[i * 3 + 2] = p.z;

        // 精细的颜色渐变
        if (p.layer === 'heart') {
          // 花心 - 深红色到暗红色
          const v = 0.3 + Math.random() * 0.3;
          colors[i * 3] = 0.35 * v;
          colors[i * 3 + 1] = 0.02 * v;
          colors[i * 3 + 2] = 0.05 * v;
        } else if (p.layer === 'inner') {
          // 内层 - 正红到深红
          const v = 0.5 + Math.random() * 0.4;
          colors[i * 3] = 0.7 * v;
          colors[i * 3 + 1] = 0.05 * v;
          colors[i * 3 + 2] = 0.1 * v;
        } else if (p.layer === 'outer') {
          // 外层 - 玫瑰红到酒红
          const v = 0.55 + Math.random() * 0.35;
          colors[i * 3] = 0.55 * v;
          colors[i * 3 + 1] = 0.04 * v;
          colors[i * 3 + 2] = 0.08 * v;
        } else if (p.layer === 'outermost') {
          // 最外层 - 偏暗
          const v = 0.45 + Math.random() * 0.3;
          colors[i * 3] = 0.45 * v;
          colors[i * 3 + 1] = 0.03 * v;
          colors[i * 3 + 2] = 0.06 * v;
        } else if (p.layer === 'stem') {
          // 茎 - 深绿
          colors[i * 3] = 0.08;
          colors[i * 3 + 1] = 0.22;
          colors[i * 3 + 2] = 0.08;
        } else {
          // 叶子 - 绿色
          colors[i * 3] = 0.08;
          colors[i * 3 + 1] = 0.28;
          colors[i * 3 + 2] = 0.08;
        }

        sizes[i] = p.size;
      });

      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
      geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

      const material = new THREE.PointsMaterial({
        size: 0.02,
        vertexColors: true,
        transparent: true,
        opacity: 0.95,
        sizeAttenuation: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      });

      roseParticles = new THREE.Points(geometry, material);
      scene.add(roseParticles);
    }

    createRose();

    // Interaction
    let rotation = { x: -0.2, y: 0 };
    let targetRotation = { x: -0.2, y: 0 };
    let isDragging = false;
    let lastPos = { x: 0, y: 0 };
    let autoRotate = true;
    let autoTimer;

    function onStart(x, y) {
      isDragging = true;
      autoRotate = false;
      clearTimeout(autoTimer);
      lastPos = { x, y };
    }

    function onMove(x, y) {
      if (isDragging) {
        targetRotation.y += (x - lastPos.x) * 0.006;
        targetRotation.x += (y - lastPos.y) * 0.004;
        targetRotation.x = Math.max(-0.8, Math.min(0.4, targetRotation.x));
        lastPos = { x, y };
      }
    }

    function onEnd() {
      isDragging = false;
      autoTimer = setTimeout(() => { autoRotate = true; }, 4000);
    }

    container.addEventListener('mousedown', e => onStart(e.clientX, e.clientY));
    container.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
    container.addEventListener('mouseup', onEnd);
    container.addEventListener('mouseleave', onEnd);

    container.addEventListener('touchstart', e => onStart(e.touches[0].clientX, e.touches[0].clientY));
    container.addEventListener('touchmove', e => onMove(e.touches[0].clientX, e.touches[0].clientY));
    container.addEventListener('touchend', onEnd);

    // Click detection
    let clickPos = { x: 0, y: 0 };
    container.addEventListener('mousedown', e => clickPos = { x: e.clientX, y: e.clientY });
    container.addEventListener('click', e => {
      const dist = Math.hypot(e.clientX - clickPos.x, e.clientY - clickPos.y);
      if (dist < 5) {
        blooming = !blooming;
        bloomTarget = blooming ? 1 : 0;
      }
    });

    // Animation
    function animate() {
      requestAnimationFrame(animate);

      // Auto rotation
      if (autoRotate) targetRotation.y += 0.004;

      // Smooth rotation
      rotation.x += (targetRotation.x - rotation.x) * 0.06;
      rotation.y += (targetRotation.y - rotation.y) * 0.06;
      roseParticles.rotation.x = rotation.x;
      roseParticles.rotation.y = rotation.y;

      // Bloom animation
      bloomCurrent += (bloomTarget - bloomCurrent) * 0.025;

      const positions = roseParticles.geometry.attributes.position.array;
      
      particleData.forEach((p, i) => {
        if (bloomCurrent > 0.001) {
          if (p.layer === 'heart' || p.layer === 'inner' || p.layer === 'outer' || p.layer === 'outermost') {
            const expand = bloomCurrent * 0.25;
            const float = bloomCurrent * 0.15;
            positions[i * 3] = p.ox * (1 + expand);
            positions[i * 3 + 1] = p.oy + float + bloomCurrent * Math.sin(i) * 0.02;
            positions[i * 3 + 2] = p.oz * (1 + expand);
          }
        } else {
          positions[i * 3] = p.ox;
          positions[i * 3 + 1] = p.oy;
          positions[i * 3 + 2] = p.oz;
        }
      });

      roseParticles.geometry.attributes.position.needsUpdate = true;

      // Pulsing glow
      const pulse = Math.sin(Date.now() * 0.002) * 0.3 + 0.7;
      spotLight.intensity = 3 + bloomCurrent * pulse * 2;

      renderer.render(scene, camera);
    }

    // Resize
    window.addEventListener('resize', () => {
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    });

    animate();
  </script>
</body>
</html>
