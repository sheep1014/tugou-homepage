<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>七周年</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      background: radial-gradient(ellipse at center, #1a1012 0%, #0a0a0a 70%);
      overflow: hidden;
      font-family: 'Times New Roman', serif;
    }

    #canvas-container {
      position: relative;
      width: 100%;
      height: 70vh;
      cursor: grab;
    }

    #canvas-container:active {
      cursor: grabbing;
    }

    .hint {
      position: absolute;
      top: 55%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #3a3a3a;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.8s ease;
      pointer-events: none;
      font-family: 'Courier New', monospace;
    }

    #canvas-container:hover .hint {
      opacity: 1;
    }

    .date {
      position: absolute;
      bottom: 18%;
      font-size: 16px;
      font-weight: 300;
      color: #6a5a4a;
      letter-spacing: 5px;
    }

    .years {
      position: absolute;
      bottom: 12%;
      font-size: 10px;
      color: #4a4a4a;
      letter-spacing: 3px;
    }

    .instructions {
      position: absolute;
      bottom: 6%;
      font-size: 9px;
      color: #333;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div id="canvas-container">
    <div class="hint">drag to rotate</div>
  </div>
  <div class="date">2019.3.3 — 2026.3.3</div>
  <div class="years">SEVEN YEARS</div>
  <div class="instructions">click to bloom</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // Scene setup
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.z = 5;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    // Lighting
    const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
    scene.add(ambientLight);

    const pointLight1 = new THREE.PointLight(0xc41e3a, 1.5, 100);
    pointLight1.position.set(3, 3, 3);
    scene.add(pointLight1);

    const pointLight2 = new THREE.PointLight(0x8b0a1a, 1, 100);
    pointLight2.position.set(-3, -2, 2);
    scene.add(pointLight2);

    // Rose group
    const roseGroup = new THREE.Group();
    scene.add(roseGroup);

    // Materials
    const petalMaterial = new THREE.MeshStandardMaterial({
      color: 0x8b0a1a,
      side: THREE.DoubleSide,
      roughness: 0.6,
      metalness: 0.1,
    });

    const stemMaterial = new THREE.MeshStandardMaterial({
      color: 0x1d4d1d,
      roughness: 0.8,
    });

    // Create rose petals using parametric approach
    function createPetal(size, isInner = false) {
      const shape = new THREE.Shape();
      const s = size;
      
      shape.moveTo(0, 0);
      shape.bezierCurveTo(s * 0.3, s * 0.5, s * 0.5, s * 0.8, 0, s);
      shape.bezierCurveTo(-s * 0.5, s * 0.8, -s * 0.3, s * 0.5, 0, 0);

      const geometry = new THREE.ShapeGeometry(shape);
      return new THREE.Mesh(geometry, petalMaterial);
    }

    // Build rose
    const petals = [];
    
    // Inner petals (center)
    for (let i = 0; i < 8; i++) {
      const petal = createPetal(0.3, true);
      petal.position.y = 0.8;
      petal.rotation.x = -Math.PI / 4 + Math.random() * 0.2;
      petal.rotation.z = (i / 8) * Math.PI * 2;
      petal.userData.originalRotationX = petal.rotation.x;
      petals.push(petal);
      roseGroup.add(petal);
    }

    // Middle petals
    for (let i = 0; i < 10; i++) {
      const petal = createPetal(0.45);
      petal.position.y = 0.7;
      petal.rotation.x = -Math.PI / 3 + Math.random() * 0.15;
      petal.rotation.z = (i / 10) * Math.PI * 2;
      petal.userData.originalRotationX = petal.rotation.x;
      petals.push(petal);
      roseGroup.add(petal);
    }

    // Outer petals
    for (let i = 0; i < 12; i++) {
      const petal = createPetal(0.55);
      petal.position.y = 0.5;
      petal.rotation.x = -Math.PI / 2.5;
      petal.rotation.z = (i / 12) * Math.PI * 2;
      petal.userData.originalRotationX = petal.rotation.x;
      petals.push(petal);
      roseGroup.add(petal);
    }

    // Stem
    const stemGeometry = new THREE.CylinderGeometry(0.04, 0.06, 2.5, 8);
    const stem = new THREE.Mesh(stemGeometry, stemMaterial);
    stem.position.y = -0.8;
    roseGroup.add(stem);

    // Leaves
    const leafShape = new THREE.Shape();
    leafShape.moveTo(0, 0);
    leafShape.bezierCurveTo(0.3, 0.1, 0.4, 0.3, 0, 0.5);
    leafShape.bezierCurveTo(-0.4, 0.3, -0.3, 0.1, 0, 0);

    const leafGeometry = new THREE.ShapeGeometry(leafShape);
    const leafMaterial = new THREE.MeshStandardMaterial({ 
      color: 0x1d4d1d, 
      side: THREE.DoubleSide,
      roughness: 0.8
    });

    const leaf1 = new THREE.Mesh(leafGeometry, leafMaterial);
    leaf1.position.set(0.1, -0.3, 0);
    leaf1.rotation.z = Math.PI / 6;
    leaf1.rotation.x = -Math.PI / 6;
    roseGroup.add(leaf1);

    const leaf2 = new THREE.Mesh(leafGeometry, leafMaterial);
    leaf2.position.set(-0.1, -0.5, 0);
    leaf2.rotation.z = -Math.PI / 5;
    leaf2.rotation.x = Math.PI / 8;
    leaf2.scale.set(0.8, 0.8, 0.8);
    roseGroup.add(leaf2);

    // Position rose
    roseGroup.position.y = 0.3;
    roseGroup.rotation.x = 0.3;

    // Interaction
    let isDragging = false;
    let previousMousePosition = { x: 0, y: 0 };
    let autoRotate = true;
    let blooming = false;

    container.addEventListener('mousedown', (e) => {
      isDragging = true;
      autoRotate = false;
      previousMousePosition = { x: e.clientX, y: e.clientY };
    });

    container.addEventListener('mouseup', () => {
      isDragging = false;
      setTimeout(() => { autoRotate = true; }, 3000);
    });

    container.addEventListener('mousemove', (e) => {
      if (isDragging) {
        const deltaMove = {
          x: e.clientX - previousMousePosition.x,
          y: e.clientY - previousMousePosition.y
        };

        roseGroup.rotation.y += deltaMove.x * 0.01;
        roseGroup.rotation.x += deltaMove.y * 0.01;

        previousMousePosition = { x: e.clientX, y: e.clientY };
      }
    });

    // Touch support
    container.addEventListener('touchstart', (e) => {
      isDragging = true;
      autoRotate = false;
      previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    });

    container.addEventListener('touchend', () => {
      isDragging = false;
      setTimeout(() => { autoRotate = true; }, 3000);
    });

    container.addEventListener('touchmove', (e) => {
      if (isDragging) {
        const deltaMove = {
          x: e.touches[0].clientX - previousMousePosition.x,
          y: e.touches[0].clientY - previousMousePosition.y
        };

        roseGroup.rotation.y += deltaMove.x * 0.01;
        roseGroup.rotation.x += deltaMove.y * 0.01;

        previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      }
    });

    // Click to bloom
    container.addEventListener('click', (e) => {
      if (Math.abs(e.clientX - previousMousePosition.x) < 5 && Math.abs(e.clientY - previousMousePosition.y) < 5) {
        blooming = !blooming;
      }
    });

    // Bloom animation
    function animateBloom() {
      petals.forEach((petal, i) => {
        const targetX = blooming 
          ? petal.userData.originalRotationX - 0.4 
          : petal.userData.originalRotationX;
        
        petal.rotation.x += (targetX - petal.rotation.x) * 0.05;
      });

      // Glow effect
      if (blooming) {
        pointLight1.intensity = 1.5 + Math.sin(Date.now() * 0.003) * 0.5;
      } else {
        pointLight1.intensity = 1.5;
      }
    }

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);

      if (autoRotate && !isDragging) {
        roseGroup.rotation.y += 0.005;
      }

      animateBloom();

      renderer.render(scene, camera);
    }

    // Handle resize
    window.addEventListener('resize', () => {
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    });

    animate();
  </script>
</body>
</html>
