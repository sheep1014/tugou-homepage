<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>七周年</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      background: radial-gradient(ellipse at center, #1a1012 0%, #0a0a0a 70%);
      overflow: hidden;
      font-family: 'Cormorant Garamond', serif;
    }

    .rose-container {
      position: relative;
      width: 300px;
      height: 400px;
      cursor: pointer;
      transition: transform 0.5s ease;
    }

    .rose-container:hover {
      transform: scale(1.05);
    }

    .rose {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 180px;
      height: 240px;
    }

    .rose .stem {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 120px;
      background: linear-gradient(to top, #1a3d1a, #2d5a2d);
      border-radius: 2px;
    }

    .rose .leaf {
      position: absolute;
      width: 30px;
      height: 15px;
      background: #1d4d1d;
      border-radius: 0 50% 0 50%;
    }

    .rose .leaf.left {
      left: -25px;
      bottom: 40px;
      transform: rotate(-30deg);
    }

    .rose .leaf.right {
      right: -25px;
      bottom: 60px;
      transform: rotate(30deg) scaleX(-1);
    }

    .rose .flower {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 120px;
    }

    .rose .petal {
      position: absolute;
      width: 60px;
      height: 80px;
      background: linear-gradient(135deg, #8b1538 0%, #5c0d25 50%, #3d0a18 100%);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      transform-origin: center bottom;
      transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: inset -5px -5px 15px rgba(0,0,0,0.4), 0 0 20px rgba(139, 21, 56, 0.3);
    }

    .rose .petal:nth-child(1) {
      left: 30px;
      top: 20px;
      transform: rotate(-30deg);
    }

    .rose .petal:nth-child(2) {
      left: 60px;
      top: 0;
      transform: rotate(0deg);
    }

    .rose .petal:nth-child(3) {
      left: 60px;
      top: 40px;
      transform: rotate(90deg);
    }

    .rose .petal:nth-child(4) {
      left: 30px;
      top: 60px;
      transform: rotate(180deg);
    }

    .rose .petal:nth-child(5) {
      left: 0;
      top: 40px;
      transform: rotate(-90deg);
    }

    .rose .center {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 40px;
      height: 40px;
      background: radial-gradient(circle, #2a0a15 0%, #5c1a2a 100%);
      border-radius: 50%;
      box-shadow: 0 0 15px rgba(139, 21, 56, 0.5);
    }

    .rose-container.bloom .petal:nth-child(1) { transform: rotate(-45deg) scale(1.1); }
    .rose-container.bloom .petal:nth-child(2) { transform: rotate(-15deg) scale(1.1); }
    .rose-container.bloom .petal:nth-child(3) { transform: rotate(15deg) scale(1.1); }
    .rose-container.bloom .petal:nth-child(4) { transform: rotate(45deg) scale(1.1); }
    .rose-container.bloom .petal:nth-child(5) { transform: rotate(-75deg) scale(1.1); }

    .rose-container.bloom .flower {
      animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { filter: drop-shadow(0 0 10px rgba(139, 21, 56, 0.3)); }
      to { filter: drop-shadow(0 0 25px rgba(139, 21, 56, 0.6)); }
    }

    .hint {
      position: absolute;
      bottom: 120px;
      color: #555;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .rose-container:hover + .hint,
    .rose-container.bloom ~ .hint {
      opacity: 1;
    }

    .date {
      position: absolute;
      bottom: 60px;
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 400;
      color: #8a7a6a;
      letter-spacing: 8px;
    }

    .years {
      position: absolute;
      bottom: 25px;
      font-family: 'Playfair Display', serif;
      font-size: 14px;
      color: #4a4a4a;
      letter-spacing: 3px;
    }

    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(139, 21, 56, 0.3);
      border-radius: 50%;
      animation: float 15s infinite;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(100vh) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translateY(-100px) rotate(720deg);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>
  
  <div class="rose-container" id="rose">
    <div class="rose">
      <div class="stem"></div>
      <div class="leaf left"></div>
      <div class="leaf right"></div>
      <div class="flower">
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="petal"></div>
        <div class="center"></div>
      </div>
    </div>
  </div>
  
  <div class="hint">点击绽放</div>
  <div class="date">2019.3.3 — 2026.3.3</div>
  <div class="years">SEVEN YEARS</div>

  <script>
    const rose = document.getElementById('rose');
    let blooming = false;

    rose.addEventListener('click', () => {
      blooming = !blooming;
      rose.classList.toggle('bloom', blooming);
    });

    // Create particles
    const particlesContainer = document.getElementById('particles');
    for (let i = 0; i < 20; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.animationDelay = Math.random() * 15 + 's';
      particle.style.animationDuration = (15 + Math.random() * 10) + 's';
      particlesContainer.appendChild(particle);
    }
  </script>
</body>
</html>
