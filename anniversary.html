<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>七周年</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      background: radial-gradient(ellipse at 50% 40%, #151520 0%, #0a0a0f 60%, #050508 100%);
      overflow: hidden;
      font-family: 'ZCOOL KuaiLe', 'Noto Sans SC', sans-serif;
    }

    #canvas-container {
      position: relative;
      width: 100%;
      height: 75vh;
    }

    .hint {
      position: absolute;
      top: 52%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #3a3a4a;
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 1s ease;
      pointer-events: none;
    }

    #canvas-container:hover .hint {
      opacity: 1;
    }

    .title {
      position: absolute;
      bottom: 28%;
      font-size: 18px;
      font-weight: 400;
      color: #e85080;
      letter-spacing: 6px;
      text-shadow: 0 0 20px rgba(232, 80, 128, 0.5);
      opacity: 0;
      transition: opacity 1.5s ease;
    }

    .title.show {
      opacity: 1;
    }

    .date {
      position: absolute;
      bottom: 20%;
      font-size: 14px;
      font-weight: 300;
      color: #6a5a6a;
      letter-spacing: 5px;
    }

    .years {
      position: absolute;
      bottom: 14%;
      font-size: 10px;
      color: #4a4a5a;
      letter-spacing: 4px;
    }

    @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');
  </style>
</head>
<body>
  <div id="canvas-container">
    <div class="hint">waiting...</div>
  </div>
  <div class="title">我的小龟，七周年快乐</div>
  <div class="date">2019.3.3 — 2026.3.3</div>
  <div class="years">SEVEN YEARS</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // Scene setup
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.z = 8;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    // Lighting
    const ambientLight = new THREE.AmbientLight(0x202030, 1.5);
    scene.add(ambientLight);

    const spotLight = new THREE.SpotLight(0xff3080, 3, 25, Math.PI / 4, 0.5);
    spotLight.position.set(0, 5, 8);
    spotLight.target.position.set(0, 0, 0);
    scene.add(spotLight);
    scene.add(spotLight.target);

    const fillLight = new THREE.PointLight(0x603080, 1.5, 15);
    fillLight.position.set(-4, -2, 3);
    scene.add(fillLight);

    // Tetris blocks
    let blocks = [];
    let targetPositions = [];
    let animationPhase = 'falling'; // falling, forming, complete
    let startTime = Date.now();

    // Tetris shapes (标准的7种俄罗斯方块)
    const tetrisShapes = [
      // I
      [[1,1,1,1]],
      // O
      [[1,1],[1,1]],
      // T
      [[0,1,0],[1,1,1]],
      // S
      [[0,1,1],[1,1,0]],
      // Z
      [[1,1,0],[0,1,1]],
      // J
      [[1,0,0],[1,1,1]],
      // L
      [[0,0,1],[1,1,1]]
    ];

    // Heart shape grid (20x20)
    const heartGrid = [
      "00000000000000000000",
      "00000000000000000000",
      "00000000000000000000",
      "00000011100000000000",
      "00001111110000000000",
      "00011111111000000000",
      "00111111111100000000",
      "00111111111100000000",
      "01111111111110000000",
      "01111111111110000000",
      "11111111111111000000",
      "11111111111111000000",
      "11111111111111000000",
      "01111111111110000000",
      "01111111111110000000",
      "00111111111100000000",
      "00111111111100000000",
      "00011111111000000000",
      "00001111110000000000",
      "00000111100000000000",
    ];

    // Generate blocks
    function createBlocks() {
      const blockSize = 0.35;
      const gap = 0.02;
      const totalSize = blockSize + gap;
      
      // Create target positions from heart grid
      targetPositions = [];
      const gridWidth = 20;
      const gridHeight = 20;
      const offsetX = -gridWidth * totalSize / 2;
      const offsetY = gridHeight * totalSize / 2 - 2;

      for (let y = 0; y < gridHeight; y++) {
        for (let x = 0; x < gridWidth; x++) {
          if (heartGrid[y][x] === '1') {
            targetPositions.push({
              x: offsetX + x * totalSize,
              y: offsetY - y * totalSize,
              z: 0
            });
          }
        }
      }

      // Create falling blocks
      const numBlocks = targetPositions.length;
      const colors = [
        0x00ffff, // I - 青色
        0xffff00, // O - 黄色
        0xff00ff, // T - 紫色
        0x00ff00, // S - 绿色
        0xff0000, // Z - 红色
        0x0000ff, // J - 蓝色
        0xff8800  // L - 橙色
      ];

      for (let i = 0; i < numBlocks; i++) {
        // Random tetris shape
        const shapeIdx = Math.floor(Math.random() * tetrisShapes.length);
        const shape = tetrisShapes[shapeIdx];
        const color = colors[shapeIdx];

        // Create block group
        const blockGroup = new THREE.Group();
        
        // Create cubes for this shape
        shape.forEach((row, ry) => {
          row.forEach((cell, rx) => {
            if (cell) {
              const geometry = new THREE.BoxGeometry(blockSize * 0.95, blockSize * 0.95, blockSize * 0.95);
              
              // Slightly different shade for each cube
              const shade = 0.85 + Math.random() * 0.15;
              const material = new THREE.MeshStandardMaterial({
                color: color * shade,
                roughness: 0.3,
                metalness: 0.1,
                emissive: color,
                emissiveIntensity: 0.1
              });
              
              const cube = new THREE.Mesh(geometry, material);
              cube.position.set(
                (rx - shape[0].length / 2 + 0.5) * totalSize,
                -(ry - shape.length / 2 + 0.5) * totalSize,
                0
              );
              blockGroup.add(cube);
            }
          });
        });

        // Random starting position (above the screen)
        const startX = (Math.random() - 0.5) * 12;
        const startY = 6 + Math.random() * 4;
        const startZ = (Math.random() - 0.5) * 2;

        blockGroup.position.set(startX, startY, startZ);
        
        // Random rotation speed
        blockGroup.userData = {
          rotationSpeed: {
            x: (Math.random() - 0.5) * 0.02,
            y: (Math.random() - 0.5) * 0.02,
            z: (Math.random() - 0.5) * 0.02
          },
          targetPos: targetPositions[i],
          delay: i * 15, // Stagger the animations
          speed: 0.03 + Math.random() * 0.02,
          arrived: false,
          originalDelay: i * 15
        };

        blocks.push(blockGroup);
        scene.add(blockGroup);
      }
    }

    createBlocks();

    // Animation
    const clock = new THREE.Clock();
    let formComplete = false;

    function animate() {
      requestAnimationFrame(animate);
      const time = clock.getElapsedTime() * 1000;
      const elapsed = Date.now() - startTime;

      // Phase 1: Falling and forming
      if (!formComplete) {
        let allArrived = true;
        
        blocks.forEach((block, i) => {
          const data = block.userData;
          
          if (elapsed < data.delay) {
            allArrived = false;
            return;
          }

          const target = data.targetPos;
          
          if (!data.arrived) {
            // Move towards target
            const dx = target.x - block.position.x;
            const dy = target.y - block.position.y;
            const dz = target.z - block.position.z;
            
            block.position.x += dx * data.speed;
            block.position.y += dy * data.speed;
            block.position.z += dz * data.speed;

            // Gradually stop rotation as it approaches
            block.rotation.x *= 0.95;
            block.rotation.y *= 0.95;
            block.rotation.z *= 0.95;

            // Check if arrived
            if (Math.abs(dx) < 0.01 && Math.abs(dy) < 0.01 && Math.abs(dz) < 0.01) {
              data.arrived = true;
              block.position.set(target.x, target.y, target.z);
            } else {
              allArrived = false;
            }
          } else {
            // Gentle idle animation
            block.rotation.x = Math.sin(time * 0.001 + i) * 0.02;
            block.rotation.y = Math.cos(time * 0.0015 + i) * 0.02;
          }
        });

        if (allArrived && elapsed > blocks.length * 15 + 2000) {
          formComplete = true;
          animationPhase = 'complete';
          document.querySelector('.title').classList.add('show');
          
          // Change all blocks to pink/red
          blocks.forEach(block => {
            block.children.forEach(cube => {
              cube.material.color.setHex(0xff3080);
              cube.material.emissive.setHex(0xff2060);
              cube.material.emissiveIntensity = 0.3;
            });
          });
        }
      } else {
        // Complete - heart beats
        const beat = Math.sin(time * 0.003) * 0.015 + 1;
        
        blocks.forEach((block, i) => {
          block.scale.setScalar(beat);
          block.rotation.y = Math.sin(time * 0.001 + i * 0.1) * 0.05;
        });

        // Pulsing light
        spotLight.intensity = 3 + Math.sin(time * 0.003) * 1;
      }

      renderer.render(scene, camera);
    }

    // Resize
    window.addEventListener('resize', () => {
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    });

    animate();
  </script>
</body>
</html>
