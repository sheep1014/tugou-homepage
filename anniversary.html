<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>七周年</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #080808;
      background: radial-gradient(ellipse at 50% 35%, #151010 0%, #080808 50%, #030303 100%);
      overflow: hidden;
      font-family: 'Times New Roman', serif;
    }

    #canvas-container {
      position: relative;
      width: 100%;
      height: 72vh;
      cursor: pointer;
    }

    .hint {
      position: absolute;
      top: 52%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #2a2a2a;
      font-size: 9px;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 1s ease;
      pointer-events: none;
      font-family: 'Courier New', monospace;
    }

    #canvas-container:hover .hint {
      opacity: 1;
    }

    .date {
      position: absolute;
      bottom: 16%;
      font-size: 14px;
      font-weight: 300;
      color: #5a4a3a;
      letter-spacing: 6px;
    }

    .years {
      position: absolute;
      bottom: 10%;
      font-size: 9px;
      color: #3a3a3a;
      letter-spacing: 4px;
    }
  </style>
</head>
<body>
  <div id="canvas-container">
    <div class="hint">tap to feel</div>
  </div>
  <div class="date">2019.3.3 — 2026.3.3</div>
  <div class="years">SEVEN YEARS</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // Scene setup
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(55, container.clientWidth / container.clientHeight, 0.01, 1000);
    camera.position.z = 3.2;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    // Lighting
    const ambientLight = new THREE.AmbientLight(0x151010, 1.2);
    scene.add(ambientLight);

    const spotLight = new THREE.SpotLight(0xff3040, 4, 20, Math.PI / 4, 0.5);
    spotLight.position.set(0, 3, 4);
    spotLight.target.position.set(0, 0, 0);
    scene.add(spotLight);
    scene.add(spotLight.target);

    const fillLight = new THREE.PointLight(0x400810, 2, 12);
    fillLight.position.set(-3, -1, 2);
    scene.add(fillLight);

    const rimLight = new THREE.PointLight(0xff1020, 1.5, 10);
    rimLight.position.set(2, -2, -1);
    scene.add(rimLight);

    // Heart particle system
    let heartParticles;
    let particleData = [];
    let feeling = false;
    let feelTarget = 0;
    let feelCurrent = 0;

    // Generate heart shape
    function generateHeart() {
      const points = [];
      
      // Heart surface using parametric equations
      // x = 16 sin^3 t
      // y = 13 cos t - 5 cos 2t - 2 cos 3t - cos 4t
      
      // Main heart body
      for (let i = 0; i < 3500; i++) {
        // Use heart parametric equation with some randomization
        const t = Math.random() * Math.PI * 2;
        const u = Math.random();
        
        // Heart curve
        let x = 16 * Math.pow(Math.sin(t), 3);
        let y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
        
        // Scale and add depth
        const scale = 0.035 + u * 0.025;
        const depth = (Math.random() - 0.5) * 0.08;
        
        // Add surface detail
        const noiseX = (Math.random() - 0.5) * 0.02;
        const noiseY = (Math.random() - 0.5) * 0.02;
        const noiseZ = (Math.random() - 0.5) * 0.015;
        
        points.push({
          x: x * scale + noiseX,
          y: y * scale + noiseY,
          z: depth + noiseZ,
          ox: x * scale + noiseX,
          oy: y * scale + noiseY,
          oz: depth + noiseZ,
          layer: 'surface',
          size: 0.012 + Math.random() * 0.012
        });
      }

      // Inner glow layer (closer particles)
      for (let i = 0; i < 800; i++) {
        const t = Math.random() * Math.PI * 2;
        const u = Math.random();
        
        let x = 16 * Math.pow(Math.sin(t), 3);
        let y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
        
        const scale = 0.025 + u * 0.015;
        const offset = (Math.random() - 0.5) * 0.03;
        
        points.push({
          x: x * scale + offset * 0.3,
          y: y * scale + offset * 0.3,
          z: offset,
          ox: x * scale + offset * 0.3,
          oy: y * scale + offset * 0.3,
          oz: offset,
          layer: 'inner',
          size: 0.008 + Math.random() * 0.008
        });
      }

      // Floating particles around heart
      for (let i = 0; i < 200; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.random() * Math.PI;
        const r = 0.6 + Math.random() * 0.4;
        
        points.push({
          x: r * Math.sin(phi) * Math.cos(theta),
          y: r * Math.sin(phi) * Math.sin(theta) * 0.8 - 0.1,
          z: r * Math.cos(phi),
          ox: 0, oy: 0, oz: 0,
          layer: 'float',
          size: 0.005 + Math.random() * 0.008,
          floatPhase: Math.random() * Math.PI * 2,
          floatR: r
        });
      }

      return points;
    }

    // Create particle system
    function createHeart() {
      particleData = generateHeart();
      
      const geometry = new THREE.BufferGeometry();
      const positions = new Float32Array(particleData.length * 3);
      const colors = new Float32Array(particleData.length * 3);
      const sizes = new Float32Array(particleData.length);

      particleData.forEach((p, i) => {
        positions[i * 3] = p.x;
        positions[i * 3 + 1] = p.y;
        positions[i * 3 + 2] = p.z;

        // Rich red color palette
        if (p.layer === 'surface') {
          // Outer surface - deep red to bright red
          const brightness = 0.55 + Math.random() * 0.35;
          colors[i * 3] = brightness;  // R: high
          colors[i * 3 + 1] = 0.08 + Math.random() * 0.12;  // G: low
          colors[i * 3 + 2] = 0.12 + Math.random() * 0.15;  // B: low
        } else if (p.layer === 'inner') {
          // Inner glow - bright red/pink
          const brightness = 0.7 + Math.random() * 0.3;
          colors[i * 3] = brightness;
          colors[i * 3 + 1] = 0.1 + Math.random() * 0.15;
          colors[i * 3 + 2] = 0.15 + Math.random() * 0.1;
        } else {
          // Floating - subtle pink
          colors[i * 3] = 0.6 + Math.random() * 0.2;
          colors[i * 3 + 1] = 0.1;
          colors[i * 3 + 2] = 0.15 + Math.random() * 0.1;
        }

        sizes[i] = p.size;
      });

      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
      geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

      const material = new THREE.PointsMaterial({
        size: 0.018,
        vertexColors: true,
        transparent: true,
        opacity: 0.92,
        sizeAttenuation: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      });

      heartParticles = new THREE.Points(geometry, material);
      heartParticles.position.y = -0.1;
      scene.add(heartParticles);
    }

    createHeart();

    // Interaction
    let rotation = { x: 0, y: 0 };
    let targetRotation = { x: 0, y: 0 };
    let isDragging = false;
    let lastPos = { x: 0, y: 0 };
    let autoRotate = true;
    let autoTimer;

    function onStart(x, y) {
      isDragging = true;
      autoRotate = false;
      clearTimeout(autoTimer);
      lastPos = { x, y };
    }

    function onMove(x, y) {
      if (isDragging) {
        targetRotation.y += (x - lastPos.x) * 0.006;
        targetRotation.x += (y - lastPos.y) * 0.004;
        targetRotation.x = Math.max(-0.6, Math.min(0.6, targetRotation.x));
        lastPos = { x, y };
      }
    }

    function onEnd() {
      isDragging = false;
      autoTimer = setTimeout(() => { autoRotate = true; }, 4000);
    }

    container.addEventListener('mousedown', e => onStart(e.clientX, e.clientY));
    container.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
    container.addEventListener('mouseup', onEnd);
    container.addEventListener('mouseleave', onEnd);

    container.addEventListener('touchstart', e => onStart(e.touches[0].clientX, e.touches[0].clientY));
    container.addEventListener('touchmove', e => onMove(e.touches[0].clientX, e.touches[0].clientY));
    container.addEventListener('touchend', onEnd);

    // Click detection
    let clickPos = { x: 0, y: 0 };
    container.addEventListener('mousedown', e => clickPos = { x: e.clientX, y: e.clientY });
    container.addEventListener('click', e => {
      const dist = Math.hypot(e.clientX - clickPos.x, e.clientY - clickPos.y);
      if (dist < 5) {
        feeling = !feeling;
        feelTarget = feeling ? 1 : 0;
      }
    });

    // Animation
    const clock = new THREE.Clock();
    
    function animate() {
      requestAnimationFrame(animate);
      const time = clock.getElapsedTime();

      // Auto rotation
      if (autoRotate) targetRotation.y += 0.003;

      // Smooth rotation
      rotation.x += (targetRotation.x - rotation.x) * 0.06;
      rotation.y += (targetRotation.y - rotation.y) * 0.06;
      heartParticles.rotation.x = rotation.x;
      heartParticles.rotation.y = rotation.y;

      // Feel animation
      feelCurrent += (feelTarget - feelCurrent) * 0.03;

      const positions = heartParticles.geometry.attributes.position.array;
      
      particleData.forEach((p, i) => {
        if (p.layer === 'float') {
          // Floating particles animation
          const float = Math.sin(time * 1.5 + p.floatPhase) * 0.03;
          const breathe = Math.sin(time * 0.8) * 0.01;
          positions[i * 3] = p.x + float * (1 + feelCurrent);
          positions[i * 3 + 1] = p.y + float * 0.5 + breathe;
          positions[i * 3 + 2] = p.z + float;
        } else if (feelCurrent > 0.001) {
          // Heart beats and expands
          const beat = Math.sin(time * 3) * feelCurrent * 0.015;
          const expand = feelCurrent * 0.12;
          
          positions[i * 3] = p.ox * (1 + expand) + beat * Math.cos(i);
          positions[i * 3 + 1] = p.oy * (1 + expand) + beat * Math.sin(i);
          positions[i * 3 + 2] = p.oz * (1 + expand) + beat;
        } else {
          positions[i * 3] = p.ox;
          positions[i * 3 + 1] = p.oy;
          positions[i * 3 + 2] = p.oz;
        }
      });

      heartParticles.geometry.attributes.position.needsUpdate = true;

      // Pulsing glow
      const pulse = Math.sin(time * 2.5) * 0.4 + 0.6;
      spotLight.intensity = 4 + feelCurrent * pulse * 3;
      fillLight.intensity = 2 + feelCurrent * 2;

      renderer.render(scene, camera);
    }

    // Resize
    window.addEventListener('resize', () => {
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    });

    animate();
  </script>
</body>
</html>
