<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>七周年</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      background: radial-gradient(ellipse at center, #1a1012 0%, #0a0a0a 70%);
      overflow: hidden;
      font-family: 'Times New Roman', serif;
    }

    #canvas-container {
      position: relative;
      width: 100%;
      height: 70vh;
      cursor: pointer;
    }

    .hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #3a3a3a;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.8s ease;
      pointer-events: none;
      font-family: 'Courier New', monospace;
      z-index: 10;
    }

    #canvas-container:hover .hint {
      opacity: 1;
    }

    .date {
      position: absolute;
      bottom: 18%;
      font-size: 15px;
      font-weight: 300;
      color: #6a5a4a;
      letter-spacing: 5px;
    }

    .years {
      position: absolute;
      bottom: 12%;
      font-size: 10px;
      color: #4a4a4a;
      letter-spacing: 3px;
    }
  </style>
</head>
<body>
  <div id="canvas-container">
    <div class="hint">tap to bloom</div>
  </div>
  <div class="date">2019.3.3 — 2026.3.3</div>
  <div class="years">SEVEN YEARS</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // Scene setup
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.z = 4;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    // Lighting
    const ambientLight = new THREE.AmbientLight(0x202020, 0.8);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(0xc41e3a, 2, 100);
    pointLight.position.set(2, 2, 3);
    scene.add(pointLight);

    const pointLight2 = new THREE.PointLight(0x4a050f, 1, 50);
    pointLight2.position.set(-2, -1, 2);
    scene.add(pointLight2);

    // Particle rose
    let particleRose, particleStem, particles = [];
    let blooming = false;
    let bloomProgress = 0;
    const targetBloom = { value: 0 };

    // Generate rose points using parametric equations
    function generateRosePoints() {
      const points = [];
      
      // Rose petals - using parametric surface
      for (let i = 0; i < 2000; i++) {
        const u = Math.random() * Math.PI * 2;
        const v = Math.random();
        
        // Rose shape
        const r = 0.5 * (1 - v) * (1 + 0.3 * Math.sin(5 * u));
        const x = r * Math.cos(u) * (1 + 0.2 * Math.cos(3 * u));
        const y = v * 1.2 - 0.3;
        const z = r * Math.sin(u) * (1 + 0.2 * Math.cos(3 * u));
        
        // Add some randomness
        const spread = 0.02;
        points.push({
          x: x + (Math.random() - 0.5) * spread,
          y: y + (Math.random() - 0.5) * spread,
          z: z + (Math.random() - 0.5) * spread,
          baseY: y,
          baseX: x,
          baseZ: z,
          layer: 'petal'
        });
      }

      // Inner center
      for (let i = 0; i < 300; i++) {
        const angle = Math.random() * Math.PI * 2;
        const r = Math.random() * 0.15;
        const y = Math.random() * 0.3;
        points.push({
          x: Math.cos(angle) * r,
          y: y - 0.2,
          z: Math.sin(angle) * r,
          baseX: Math.cos(angle) * r,
          baseY: y - 0.2,
          baseZ: Math.sin(angle) * r,
          layer: 'center'
        });
      }

      // Stem
      for (let i = 0; i < 400; i++) {
        const y = -0.3 - Math.random() * 2;
        const angle = Math.random() * Math.PI * 2;
        const r = 0.03 + Math.random() * 0.02;
        points.push({
          x: Math.cos(angle) * r,
          y: y,
          z: Math.sin(angle) * r,
          baseX: Math.cos(angle) * r,
          baseY: y,
          baseZ: Math.sin(angle) * r,
          layer: 'stem'
        });
      }

      // Leaves
      for (let side = -1; side <= 1; side += 2) {
        for (let i = 0; i < 80; i++) {
          const t = Math.random();
          const x = side * (0.15 + t * 0.4);
          const y = -0.5 - t * 0.8;
          const z = Math.sin(t * Math.PI) * 0.08;
          points.push({
            x: x + (Math.random() - 0.5) * 0.03,
            y: y + (Math.random() - 0.5) * 0.03,
            z: z + (Math.random() - 0.5) * 0.02,
            baseX: x,
            baseY: y,
            baseZ: z,
            layer: 'leaf'
          });
        }
      }

      return points;
    }

    // Create particle system
    function createParticleRose() {
      const rosePoints = generateRosePoints();
      
      const geometry = new THREE.BufferGeometry();
      const positions = new Float32Array(rosePoints.length * 3);
      const colors = new Float32Array(rosePoints.length * 3);
      const sizes = new Float32Array(rosePoints.length);

      rosePoints.forEach((point, i) => {
        positions[i * 3] = point.x;
        positions[i * 3 + 1] = point.y;
        positions[i * 3 + 2] = point.z;

        // Colors based on layer
        if (point.layer === 'petal') {
          const shade = 0.6 + Math.random() * 0.4;
          colors[i * 3] = 0.55 * shade;
          colors[i * 3 + 1] = 0.08 * shade;
          colors[i * 3 + 2] = 0.12 * shade;
        } else if (point.layer === 'center') {
          colors[i * 3] = 0.3 + Math.random() * 0.2;
          colors[i * 3 + 1] = 0.03;
          colors[i * 3 + 2] = 0.06;
        } else if (point.layer === 'stem') {
          colors[i * 3] = 0.1;
          colors[i * 3 + 1] = 0.3;
          colors[i * 3 + 2] = 0.1;
        } else {
          colors[i * 3] = 0.1;
          colors[i * 3 + 1] = 0.25;
          colors[i * 3 + 2] = 0.1;
        }

        sizes[i] = point.layer === 'stem' ? 0.015 : 0.02 + Math.random() * 0.015;
        
        point.originalX = point.x;
        point.originalY = point.y;
        point.originalZ = point.z;
      });

      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
      geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

      // Store original positions
      geometry.userData = { originalPositions: positions.slice(), points: rosePoints };

      const material = new THREE.PointsMaterial({
        size: 0.02,
        vertexColors: true,
        transparent: true,
        opacity: 0.9,
        sizeAttenuation: true,
        blending: THREE.AdditiveBlending
      });

      particleRose = new THREE.Points(geometry, material);
      scene.add(particleRose);
    }

    createParticleRose();

    // Rotation
    let rotation = { x: 0, y: 0 };
    let targetRotation = { x: 0, y: 0 };
    let isDragging = false;
    let previousMouse = { x: 0, y: 0 };
    let autoRotate = true;
    let autoRotateTimeout;

    container.addEventListener('mousedown', (e) => {
      isDragging = true;
      autoRotate = false;
      clearTimeout(autoRotateTimeout);
      previousMouse = { x: e.clientX, y: e.clientY };
    });

    container.addEventListener('mouseup', () => {
      isDragging = false;
      autoRotateTimeout = setTimeout(() => { autoRotate = true; }, 3000);
    });

    container.addEventListener('mousemove', (e) => {
      if (isDragging) {
        const deltaX = e.clientX - previousMouse.x;
        const deltaY = e.clientY - previousMouse.y;
        targetRotation.y += deltaX * 0.005;
        targetRotation.x += deltaY * 0.005;
        targetRotation.x = Math.max(-0.5, Math.min(0.5, targetRotation.x));
        previousMouse = { x: e.clientX, y: e.clientY };
      }
    });

    // Touch
    container.addEventListener('touchstart', (e) => {
      isDragging = true;
      autoRotate = false;
      clearTimeout(autoRotateTimeout);
      previousMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    });

    container.addEventListener('touchend', () => {
      isDragging = false;
      autoRotateTimeout = setTimeout(() => { autoRotate = true; }, 3000);
    });

    container.addEventListener('touchmove', (e) => {
      if (isDragging) {
        const deltaX = e.touches[0].clientX - previousMouse.x;
        const deltaY = e.touches[0].clientY - previousMouse.y;
        targetRotation.y += deltaX * 0.005;
        targetRotation.x += deltaY * 0.005;
        targetRotation.x = Math.max(-0.5, Math.min(0.5, targetRotation.x));
        previousMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      }
    });

    // Click to bloom
    let clickStart = { x: 0, y: 0 };
    container.addEventListener('mousedown', (e) => {
      clickStart = { x: e.clientX, y: e.clientY };
    });

    container.addEventListener('click', (e) => {
      const dist = Math.sqrt(
        Math.pow(e.clientX - clickStart.x, 2) + 
        Math.pow(e.clientY - clickStart.y, 2)
      );
      if (dist < 5) {
        blooming = !blooming;
        targetBloom.value = blooming ? 1 : 0;
      }
    });

    // Animation
    function animate() {
      requestAnimationFrame(animate);

      // Auto rotation
      if (autoRotate) {
        targetRotation.y += 0.003;
      }

      // Smooth rotation
      rotation.x += (targetRotation.x - rotation.x) * 0.05;
      rotation.y += (targetRotation.y - rotation.y) * 0.05;
      particleRose.rotation.x = rotation.x;
      particleRose.rotation.y = rotation.y;

      // Bloom animation
      bloomProgress += (targetBloom.value - bloomProgress) * 0.03;

      const positions = particleRose.geometry.attributes.position.array;
      const points = particleRose.geometry.userData.points;

      points.forEach((point, i) => {
        if (point.layer === 'petal' || point.layer === 'center') {
          const expand = bloomProgress * 0.15;
          positions[i * 3] = point.originalX * (1 + expand);
          positions[i * 3 + 1] = point.originalY + bloomProgress * 0.1;
          positions[i * 3 + 2] = point.originalZ * (1 + expand);
        }
      });

      particleRose.geometry.attributes.position.needsUpdate = true;

      // Glow effect when blooming
      if (bloomProgress > 0.1) {
        const glow = 0.5 + Math.sin(Date.now() * 0.003) * 0.3;
        pointLight.intensity = 2 + bloomProgress * glow;
      } else {
        pointLight.intensity = 2;
      }

      renderer.render(scene, camera);
    }

    // Resize
    window.addEventListener('resize', () => {
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    });

    animate();
  </script>
</body>
</html>
