<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>七周年</title>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #fff5f5 0%, #fff0f5 30%, #f5f0ff 70%, #f0f5ff 100%);
      overflow: hidden;
      font-family: 'ZCOOL KuaiLe', 'Noto Sans SC', sans-serif;
    }

    /* Floating stars */
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .star {
      position: absolute;
      width: 12px;
      height: 12px;
      animation: float-star 8s infinite ease-in-out;
    }

    .star::before {
      content: '★';
      font-size: 16px;
      color: #ffd700;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
    }

    @keyframes float-star {
      0%, 100% {
        transform: translateY(100vh) rotate(0deg) scale(0);
        opacity: 0;
      }
      10% {
        opacity: 1;
        transform: translateY(90vh) rotate(36deg) scale(1);
      }
      90% {
        opacity: 1;
        transform: translateY(-10vh) rotate(324deg) scale(1);
      }
      100% {
        transform: translateY(-20vh) rotate(360deg) scale(0);
        opacity: 0;
      }
    }

    /* Cats */
    .cats {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    .cat {
      position: absolute;
      width: 80px;
      height: 70px;
      animation: cat-bob 3s infinite ease-in-out;
    }

    .cat-left {
      top: 15%;
      left: 10%;
      animation-delay: 0s;
    }

    .cat-right {
      top: 18%;
      right: 12%;
      animation-delay: 1.5s;
    }

    @keyframes cat-bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .cat svg {
      width: 100%;
      height: 100%;
    }

    /* Loading */
    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: opacity 1s ease;
    }

    .loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-heart {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      animation: loading-bounce 0.6s infinite alternate;
      box-shadow: 0 0 20px rgba(255, 150, 170, 0.5);
    }

    .loading-heart::before {
      content: '';
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 25px;
      height: 20px;
      background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
      border-radius: 50% 50% 0 0;
    }

    @keyframes loading-bounce {
      0% { transform: scale(1) translateY(0); }
      100% { transform: scale(1.1) translateY(-10px); }
    }

    .loading-text {
      margin-top: 20px;
      font-size: 14px;
      color: #b8a9c9;
      letter-spacing: 2px;
    }

    /* Main content */
    .content {
      position: relative;
      z-index: 50;
      text-align: center;
      opacity: 0;
      transition: opacity 1.5s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .content.show {
      opacity: 1;
    }

    /* Heart animation */
    .heart-container {
      position: relative;
      width: 150px;
      height: 150px;
      margin: 20px 0;
    }

    .heart {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100px;
      height: 90px;
      animation: heart-beat 1.2s infinite ease-in-out;
    }

    .heart::before,
    .heart::after {
      content: '';
      position: absolute;
      width: 52px;
      height: 80px;
      background: linear-gradient(135deg, #ffb6c1 0%, #ff9a9e 50%, #ff6b8a 100%);
      border-radius: 50px 50px 0 0;
      box-shadow: 0 0 20px rgba(255, 150, 170, 0.4);
    }

    .heart::before {
      left: 50px;
      transform: rotate(-45deg);
      transform-origin: 0 100%;
    }

    .heart::after {
      left: 0;
      transform: rotate(45deg);
      transform-origin: 100% 100%;
    }

    @keyframes heart-beat {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      15% { transform: translate(-50%, -50%) scale(1.15); }
      30% { transform: translate(-50%, -50%) scale(1); }
      45% { transform: translate(-50%, -50%) scale(1.1); }
      60% { transform: translate(-50%, -50%) scale(1); }
    }

    /* Floating hearts */
    .float-heart {
      position: absolute;
      font-size: 20px;
      animation: float-up 4s infinite ease-out;
      opacity: 0;
    }

    @keyframes float-up {
      0% {
        transform: translateY(0) scale(0);
        opacity: 0;
      }
      20% {
        opacity: 0.8;
      }
      100% {
        transform: translateY(-150px) scale(1);
        opacity: 0;
      }
    }

    /* Title */
    .title {
      font-size: 28px;
      color: #ff6b8a;
      text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff;
      letter-spacing: 4px;
      margin-top: 10px;
    }

    /* Date */
    .date {
      font-size: 18px;
      color: #9b8aa0;
      letter-spacing: 3px;
      background: rgba(255, 255, 255, 0.7);
      padding: 8px 20px;
      border-radius: 20px;
    }

    /* Years */
    .years {
      font-size: 12px;
      color: #c8b8d0;
      letter-spacing: 4px;
    }

    /* Decorative elements */
    .deco {
      position: absolute;
      font-size: 24px;
      animation: deco-float 3s infinite ease-in-out;
    }

    .deco-1 { top: 25%; left: 20%; animation-delay: 0s; }
    .deco-2 { top: 30%; right: 18%; animation-delay: 1s; }
    .deco-3 { bottom: 25%; left: 15%; animation-delay: 0.5s; }
    .deco-4 { bottom: 30%; right: 20%; animation-delay: 1.5s; }

    @keyframes deco-float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-5px) rotate(10deg); }
    }
  </style>
</head>
<body>
  <!-- Stars -->
  <div class="stars" id="stars"></div>

  <!-- Cats -->
  <div class="cats">
    <!-- Left Cat -->
    <div class="cat cat-left">
      <svg viewBox="0 0 80 70">
        <!-- Body -->
        <ellipse cx="40" cy="50" rx="25" ry="18" fill="#f5e6d3"/>
        <!-- Head -->
        <circle cx="40" cy="28" r="18" fill="#f5e6d3"/>
        <!-- Ears -->
        <polygon points="26,18 32,8 38,18" fill="#f5e6d3"/>
        <polygon points="42,18 48,8 54,18" fill="#f5e6d3"/>
        <polygon points="28,18 32,10 36,18" fill="#ffcdd2"/>
        <polygon points="44,18 48,10 52,18" fill="#ffcdd2"/>
        <!-- Face -->
        <circle cx="34" cy="26" r="2.5" fill="#4a4a4a"/>
        <circle cx="46" cy="26" r="2.5" fill="#4a4a4a"/>
        <circle cx="35" cy="25" r="0.8" fill="#fff"/>
        <circle cx="47" cy="25" r="0.8" fill="#fff"/>
        <ellipse cx="40" cy="32" rx="3" ry="2" fill="#ffab91"/>
        <!-- Blush -->
        <ellipse cx="30" cy="30" rx="4" ry="2" fill="#ffcdd2" opacity="0.6"/>
        <ellipse cx="50" cy="30" rx="4" ry="2" fill="#ffcdd2" opacity="0.6"/>
        <!-- Whiskers -->
        <line x1="25" y1="32" x2="15" y2="30" stroke="#d4c4b0" stroke-width="1"/>
        <line x1="25" y1="34" x2="15" y2="35" stroke="#d4c4b0" stroke-width="1"/>
        <line x1="55" y1="32" x2="65" y2="30" stroke="#d4c4b0" stroke-width="1"/>
        <line x1="55" y1="34" x2="65" y2="35" stroke="#d4c4b0" stroke-width="1"/>
        <!-- Tail -->
        <path d="M60 55 Q75 50 70 35" stroke="#f5e6d3" stroke-width="6" fill="none" stroke-linecap="round"/>
      </svg>
    </div>

    <!-- Right Cat -->
    <div class="cat cat-right">
      <svg viewBox="0 0 80 70">
        <!-- Body -->
        <ellipse cx="40" cy="50" rx="25" ry="18" fill="#e8e0f0"/>
        <!-- Head -->
        <circle cx="40" cy="28" r="18" fill="#e8e0f0"/>
        <!-- Ears -->
        <polygon points="26,18 32,8 38,18" fill="#e8e0f0"/>
        <polygon points="42,18 48,8 54,18" fill="#e8e0f0"/>
        <polygon points="28,18 32,10 36,18" fill="#d1c4e9"/>
        <polygon points="44,18 48,10 52,18" fill="#d1c4e9"/>
        <!-- Face -->
        <circle cx="34" cy="26" r="2.5" fill="#4a4a4a"/>
        <circle cx="46" cy="26" r="2.5" fill="#4a4a4a"/>
        <circle cx="35" cy="25" r="0.8" fill="#fff"/>
        <circle cx="47" cy="25" r="0.8" fill="#fff"/>
        <ellipse cx="40" cy="32" rx="3" ry="2" fill="#ce93d8"/>
        <!-- Blush -->
        <ellipse cx="30" cy="30" rx="4" ry="2" fill="#d1c4e9" opacity="0.6"/>
        <ellipse cx="50" cy="30" rx="4" ry="2" fill="#d1c4e9" opacity="0.6"/>
        <!-- Whiskers -->
        <line x1="25" y1="32" x2="15" y2="30" stroke="#c4b8d4" stroke-width="1"/>
        <line x1="25" y1="34" x2="15" y2="35" stroke="#c4b8d4" stroke-width="1"/>
        <line x1="55" y1="32" x2="65" y2="30" stroke="#c4b8d4" stroke-width="1"/>
        <line x1="55" y1="34" x2="65" y2="35" stroke="#c4b8d4" stroke-width="1"/>
        <!-- Tail -->
        <path d="M20 55 Q5 50 10 35" stroke="#e8e0f0" stroke-width="6" fill="none" stroke-linecap="round"/>
      </svg>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="loading-heart"></div>
    <div class="loading-text">Loading...</div>
  </div>

  <!-- Main content -->
  <div class="content" id="content">
    <div class="heart-container">
      <div class="heart"></div>
      <span class="float-heart" style="left: 10%; animation-delay: 0s;">💕</span>
      <span class="float-heart" style="left: 30%; animation-delay: 1s;">💗</span>
      <span class="float-heart" style="left: 60%; animation-delay: 2s;">💖</span>
      <span class="float-heart" style="left: 80%; animation-delay: 3s;">💘</span>
    </div>
    
    <div class="title">我的小龟，七周年快乐</div>
    <div class="date">2019.3.3 — 2026.3.3</div>
    <div class="years">SEVEN YEARS</div>

    <!-- Decorations -->
    <span class="deco deco-1">🌸</span>
    <span class="deco deco-2">✨</span>
    <span class="deco deco-3">💫</span>
    <span class="deco deco-4">🌷</span>
  </div>

  <script>
    // Create stars
    const starsContainer = document.getElementById('stars');
    const starEmojis = ['★', '☆', '✦', '✧'];
    const starColors = ['#ffd700', '#ffb6c1', '#ff9a9e', '#fff'];
    
    for (let i = 0; i < 20; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 8 + 's';
      star.style.animationDuration = (6 + Math.random() * 4) + 's';
      
      // Random star emoji and color
      const idx = Math.floor(Math.random() * starEmojis.length);
      star.style.setProperty('--star-emoji', starEmojis[idx]);
      star.style.color = starColors[idx];
      
      starsContainer.appendChild(star);
    }

    // Loading complete
    setTimeout(() => {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('content').classList.add('show');
    }, 3000);
  </script>
</body>
</html>
