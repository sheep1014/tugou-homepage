<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>帝国时代 IV - 复兴</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
:root { --bg: #0a0f1a; --panel: #111827; --border: #1e293b; --gold: #f59e0b; --food: #ef4444; --wood: #d97706; --stone: #94a3b8; }
body { background: var(--bg); color: #e2e8f0; font-family: 'Noto Serif SC', serif; overflow: hidden; user-select: none; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
.game-container { display: grid; grid-template-rows: 48px 1fr 180px; height: 100vh; }
.header { background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); border-bottom: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; }
.main-area { display: grid; grid-template-columns: 1fr 280px; }
.game-view { background: #0f172a; position: relative; overflow: hidden; }
.side-panel { background: var(--panel); border-left: 1px solid var(--border); overflow-y: auto; }
.bottom-panel { background: linear-gradient(0deg, #1e293b 0%, #0f172a 100%); border-top: 1px solid #334155; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 8px 12px; }
.unit-card { background: #1e293b; border: 1px solid #334155; border-radius: 6px; padding: 8px; cursor: pointer; transition: all 0.15s; }
.unit-card:hover { border-color: var(--gold); background: #273549; }
.unit-card:active { transform: scale(0.96); }
.unit-card.disabled { opacity: 0.4; pointer-events: none; }
.btn-action { background: linear-gradient(180deg, #3b82f6 0%, #1d4ed8 100%); border: none; border-radius: 6px; color: white; padding: 8px 16px; font-weight: bold; cursor: pointer; font-size: 12px; }
.btn-action:hover { background: linear-gradient(180deg, #60a5fa 0%, #3b82f6 100%); }
.btn-action:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
.resource-icon { width: 16px; height: 16px; display: inline-block; vertical-align: middle; margin-right: 4px; }
.age-badge { background: linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%); padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: bold; }
.progress-bar { height: 4px; background: #334155; border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #10b981, #34d399); transition: width 0.3s; }
.building-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
.building-card { aspect-ratio: 1; background: #1e293b; border: 1px solid #334155; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-size: 10px; }
.building-card:hover { border-color: var(--gold); }
.building-card .icon { font-size: 20px; margin-bottom: 2px; }
.map-cell { width: 24px; height: 24px; border: 1px solid #1e293b; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; }
.map-cell:hover { background: #1e3a5f; }
.map-cell.player { background: #1e3a5f; border-color: #3b82f6; }
.map-cell.enemy { background: #5f1e1e; border-color: #ef4444; }
.map-cell.resource { background: #1e3a2f; border-color: #10b981; }
.popup { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 100; }
.popup-content { background: #111827; border: 2px solid #f59e0b; border-radius: 12px; padding: 24px; max-width: 400px; text-align: center; }
.civ-card { background: #1e293b; border: 2px solid #334155; border-radius: 8px; padding: 16px; cursor: pointer; transition: all 0.2s; }
.civ-card:hover { border-color: #f59e0b; transform: translateY(-2px); }
.civ-card.selected { border-color: #10b981; background: #1e3a2f; }
.event-toast { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #7c3aed, #5b21b6); padding: 12px 24px; border-radius: 8px; font-weight: bold; animation: slideDown 0.3s ease; z-index: 50; }
@keyframes slideDown { from { transform: translateX(-50%) translateY(-20px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
.unit-icon { width: 32px; height: 32px; background: #334155; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; }
.unit-row { display: flex; gap: 8px; overflow-x: auto; padding: 4px 0; }
</style>
</head>
<body>
<div class="game-container">
<!-- Header -->
<div class="header">
<div class="flex items-center gap-3">
<span id="civName" class="text-amber-400 font-bold">-</span>
<span class="age-badge" id="ageBadge">时代 I</span>
</div>
<div class="flex items-center gap-4 text-xs">
<span>🕐 <span id="gameTime">00:00</span></span>
<span>👥 <span id="popDisplay">0/10</span></span>
</div>
<div class="flex items-center gap-3">
<div class="flex items-center gap-1"><span class="resource-icon">🔴</span><span id="resFood" class="font-mono text-sm">150</span></div>
<div class="flex items-center gap-1"><span class="resource-icon">🟤</span><span id="resWood" class="font-mono text-sm">150</span></div>
<div class="flex items-center gap-1"><span class="resource-icon">🟡</span><span id="resGold" class="font-mono text-sm">100</span></div>
<div class="flex items-center gap-1"><span class="resource-icon">⚪</span><span id="resStone" class="font-mono text-sm">0</span></div>
</div>
</div>

<!-- Main Area -->
<div class="main-area">
<!-- Game View -->
<div class="game-view" id="gameView">
<div id="gameMap" class="absolute inset-0 flex items-center justify-center">
<!-- Map will be rendered here -->
</div>
<div id="selectionInfo" class="absolute bottom-2 left-2 bg-black/70 p-2 rounded text-xs hidden">
<div id="selName" class="font-bold text-amber-400"></div>
<div id="selStats"></div>
</div>
</div>

<!-- Side Panel -->
<div class="side-panel p-3 space-y-3">
<div>
<div class="text-xs text-slate-400 mb-2 font-bold">🎯 任务</div>
<div id="missionList" class="text-xs space-y-1">
<div class="text-slate-500">- 建造住房扩张人口</div>
<div class="text-slate-500">- 生产更多村民</div>
</div>
</div>
<div>
<div class="text-xs text-slate-400 mb-2 font-bold">⚔️ 军事</div>
<div id="militaryList" class="text-xs space-y-1">
<div class="text-slate-500">暂无军队</div>
</div>
</div>
<div>
<div class="text-xs text-slate-400 mb-2 font-bold">📜 科技</div>
<div id="techList" class="space-y-1">
<button class="w-full text-left text-xs bg-slate-800 p-2 rounded hover:bg-slate-700" onclick="researchTech('horse')">🔓 种田强化 (50金)</button>
<button class="w-full text-left text-xs bg-slate-800 p-2 rounded hover:bg-slate-700" onclick="researchTech('mining')">🔓 采矿强化 (50金)</button>
</div>
</div>
</div>
</div>
</div>

<!-- Bottom Panel -->
<div class="bottom-panel">
<!-- Town Center -->
<div class="space-y-2">
<div class="text-xs text-amber-400 font-bold">🏰 城镇中心</div>
<div class="unit-row">
<div class="unit-card" onclick="trainUnit('villager')">
<div class="text-xs">👨‍🌾 村民</div>
<div class="text-[10px] text-slate-400">50🔴</div>
</div>
<button class="btn-action" onclick="advanceAge()" id="advanceAgeBtn">进时代II</button>
</div>
</div>

<!-- Buildings -->
<div class="space-y-2">
<div class="text-xs text-amber-400 font-bold">🏗️ 建筑</div>
<div class="building-grid">
<div class="building-card" onclick="build('house')"><span class="icon">🏠</span><span>住房</span></div>
<div class="building-card" onclick="build('farm')"><span class="icon">🌾</span><span>磨坊</span></div>
<div class="building-card" onclick="build('barracks')"><span class="icon">⚔️</span><span>兵营</span></div>
<div class="building-card" onclick="build('stable')"><span class="icon">🐎</span><span>马厩</span></div>
</div>
</div>

<!-- Units -->
<div class="space-y-2">
<div class="text-xs text-amber-400 font-bold">⚔️ 军事单位</div>
<div class="unit-row" id="militaryUnits">
<div class="unit-card disabled" id="cardInfantry"><div class="text-xs">🗡️ 步兵</div><div class="text-[10px] text-slate-400">40🔴 20🟤</div></div>
<div class="unit-card disabled" id="cardArcher"><div class="text-xs">🏹 弓兵</div><div class="text-[10px] text-slate-400">30🔴 30🟤</div></div>
<div class="unit-card disabled" id="cardCavalry"><div class="text-xs">🐎 骑兵</div><div class="text-[10px] text-slate-400">60🔴 40🟡</div></div>
</div>
</div>
</div>
</div>

<!-- Popup: Game Over / Victory -->
<div id="popup" class="hidden">
<div class="popup">
<div class="popup-content">
<h2 id="popupTitle" class="text-2xl font-black text-amber-400 mb-2">胜利!</h2>
<p id="popupDesc" class="text-slate-300 mb-4">恭喜!</p>
<button class="btn-action" onclick="closePopup()">再来一局</button>
</div>
</div>
</div>

<!-- Event Toast -->
<div id="eventToast" class="hidden"></div>

<script>
// ==================== 游戏配置 ====================
const AGES = ['黑暗时代', '封建时代', 'castleAge', '帝王时代'];
const AGE_NAMES = ['黑暗时代', '封建时代', '城堡时代', '帝王时代'];
const AGE_COSTS = [
    { food: 400, gold: 200 },  // → 封建
    { food: 800, gold: 400 },  // → 城堡
    { food: 1600, gold: 800 }  // → 帝王
];

const BUILDINGS = {
    house: { name: '住房', cost: { wood: 30 }, pop: 10, icon: '🏠' },
    farm: { name: '磨坊', cost: { wood: 50, gold: 50 }, foodBonus: 0.25, icon: '🌾' },
    barracks: { name: '兵营', cost: { wood: 150, stone: 50 }, units: ['infantry'], icon: '⚔️' },
    stable: { name: '马厩', cost: { wood: 150, gold: 100 }, units: ['cavalry'], icon: '🐎' },
    archery: { name: '射箭场', cost: { wood: 100, gold: 100 }, units: ['archer'], icon: '🏹' },
    castle: { name: '城堡', cost: { wood: 400, stone: 200 }, icon: '🏰' },
    market: { name: '市场', cost: { wood: 100, gold: 100 }, icon: '💰' },
    wonder: { name: '奇迹', cost: { food: 2000, wood: 2000, gold: 2000, stone: 2000 }, icon: '🗿' }
};

const UNITS = {
    villager: { name: '村民', cost: { food: 50 }, pop: 1, icon: '👨‍🌾', gather: 1, hp: 25, attack: 3 },
    infantry: { name: '步兵', cost: { food: 40, wood: 20 }, pop: 1, icon: '🗡️', hp: 60, attack: 6 },
    archer: { name: '弓兵', cost: { food: 30, wood: 30 }, pop: 1, icon: '🏹', hp: 40, attack: 5, range: 4 },
    cavalry: { name: '骑士', cost: { food: 60, gold: 40 }, pop: 2, icon: '🐎', hp: 120, attack: 10 }
};

const CIVS = {
    english: { name: '英格兰', color: '#ef4444', bonus: '农田产出+15%', icon: '🏰' },
    french: { name: '法兰西', color: '#3b82f6', bonus: '骑兵+20%攻击', icon: '👑' },
    hre: { name: '神圣罗马', color: '#eab308', bonus: '步兵+20%攻击', icon: '⚔️' },
    mongols: { name: '蒙古', color: '#22d3ee', bonus: '斥候移动快', icon: '🏹' },
    chinese: { name: '中国', color: '#ef4444', bonus: '村民效率+20%', icon: '🐉' },
    delhi: { name: '德里苏丹', color: '#22c55e', bonus: '科技-25%成本', icon: '🐘' },
    abbasid: { name: '黑衣大食', color: '#14b8a6', bonus: '贸易+25%', icon: '🕌' },
    rus: { name: '罗斯', color: '#f97316', bonus: '猎捕+50%', icon: '🪓' }
};

// ==================== 游戏状态 ====================
let game = {
    screen: 'menu', // menu, playing, gameover
    civ: null,
    age: 0,
    time: 0,
    resources: { food: 150, wood: 150, gold: 100, stone: 0 },
    population: { current: 5, max: 10 },
    buildings: [],
    units: [],
    selectedUnit: null,
    enemyBase: { hp: 100, level: 1 },
    waveTimer: 180,
    wave: 0,
    techs: { ecoFood: 0, ecoWood: 0, ecoGold: 0, horse: false, mining: false },
    wondersBuilt: 0,
    wonderTimer: 0
};

let gameLoop = null;

// ==================== 初始化 ====================
function initGame(civId) {
    game.civ = CIVS[civId];
    game.age = 0;
    game.time = 0;
    game.resources = { food: 150, wood: 150, gold: 100, stone: 0 };
    game.population = { current: 5, max: 10 };
    game.buildings = [{ type: 'townhall', x: 5, y: 5, hp: 500, name: '城镇中心' }];
    game.units = [
        { type: 'villager', x: 5, y: 6, hp: 25, state: 'idle', target: null, gatherTarget: null, gatherTimer: 0 }
    ];
    game.enemyBase = { hp: 100, level: 1 };
    game.waveTimer = 180;
    game.wave = 0;
    game.techs = { ecoFood: 0, ecoWood: 0, ecoGold: 0, horse: false, mining: false };
    game.wondersBuilt = 0;
    game.wonderTimer = 0;
    game.screen = 'playing';
    
    document.getElementById('popup').classList.add('hidden');
    updateUI();
    startGameLoop();
    renderMap();
}

function startGameLoop() {
    if (gameLoop) clearInterval(gameLoop);
    gameLoop = setInterval(gameTick, 1000);
}

function gameTick() {
    if (game.screen !== 'playing') return;
    
    game.time++;
    
    // 村民采集
    game.units.filter(u => u.type === 'villager' && u.gatherTarget).forEach(v => {
        const target = game.units.find(u => u.id === v.gatherTarget);
        if (target && target.hp <= 0) {
            v.gatherTarget = null;
            return;
        }
        v.gatherTimer++;
        if (v.gatherTimer >= 3) {
            v.gatherTimer = 0;
            const bonus = game.civ.id === 'chinese' ? 1.2 : 1;
            if (v.gatherType === 'food') {
                game.resources.food += Math.floor(5 * bonus * (1 + game.techs.ecoFood * 0.15));
            } else if (v.gatherType === 'wood') {
                game.resources.wood += Math.floor(5 * bonus * (1 + game.techs.ecoWood * 0.15));
            } else if (v.gatherType === 'gold') {
                game.resources.gold += Math.floor(5 * bonus * (1 + game.techs.ecoGold * 0.15));
            }
        }
    });
    
    // 敌人波次
    game.waveTimer--;
    if (game.waveTimer <= 0) {
        game.wave++;
        game.waveTimer = 150 - game.wave * 5;
        spawnEnemyWave();
    }
    
    // 奇迹防守
    if (game.wonderTimer > 0) {
        game.wonderTimer--;
        if (game.wonderTimer <= 0) {
            showPopup('胜利!', '世界奇观守护成功!');
        }
    }
    
    updateUI();
}

// ==================== UI 更新 ====================
function updateUI() {
    document.getElementById('civName').textContent = game.civ?.name || '-';
    document.getElementById('ageBadge').textContent = '时代 ' + (game.age + 1);
    document.getElementById('gameTime').textContent = formatTime(game.time);
    document.getElementById('popDisplay').textContent = game.population.current + '/' + game.population.max;
    document.getElementById('resFood').textContent = Math.floor(game.resources.food);
    document.getElementById('resWood').textContent = Math.floor(game.resources.wood);
    document.getElementById('resGold').textContent = Math.floor(game.resources.gold);
    document.getElementById('resStone').textContent = Math.floor(game.resources.stone);
    
    // 更新军事单位按钮
    const hasBarracks = game.buildings.some(b => b.type === 'barracks');
    const hasStable = game.buildings.some(b => b.type === 'stable');
    document.getElementById('cardInfantry').classList.toggle('disabled', !hasBarracks || game.age < 1);
    document.getElementById('cardArcher').classList.toggle('disabled', game.age < 1);
    document.getElementById('cardCavalry').classList.toggle('disabled', !hasStable || game.age < 2);
    
    // 更新时代按钮
    const ageBtn = document.getElementById('advanceAgeBtn');
    if (game.age >= 3) {
        ageBtn.textContent = '帝王时代';
        ageBtn.disabled = true;
    } else {
        const cost = AGE_COSTS[game.age];
        ageBtn.textContent = `进${AGE_NAMES[game.age + 1]} (${cost.food}🔴 ${cost.gold}🟡)`;
        ageBtn.disabled = game.resources.food < cost.food || game.resources.gold < cost.gold;
    }
    
    // 更新军事列表
    const milUnits = game.units.filter(u => u.type !== 'villager');
    const milList = document.getElementById('militaryList');
    if (milUnits.length === 0) {
        milList.innerHTML = '<div class="text-slate-500">暂无军队</div>';
    } else {
        const counts = {};
        milUnits.forEach(u => { counts[u.type] = (counts[u.type] || 0) + 1; });
        milList.innerHTML = Object.entries(counts).map(([t, c]) => 
            `<div>${UNITS[t].icon} ${UNITS[t].name} x${c}</div>`
        ).join('');
    }
}

function formatTime(sec) {
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
}

// ==================== 玩家操作 ====================
function trainUnit(type) {
    const unit = UNITS[type];
    if (game.resources.food < (unit.cost.food || 0) || 
        game.resources.wood < (unit.cost.wood || 0) ||
        game.resources.gold < (unit.cost.gold || 0)) {
        return;
    }
    if (game.population.current + unit.pop > game.population.max) {
        return;
    }
    
    game.resources.food -= (unit.cost.food || 0);
    game.resources.wood -= (unit.cost.wood || 0);
    game.resources.gold -= (unit.cost.gold || 0);
    game.population.current += unit.pop;
    
    // 找空位放置单位
    const base = game.buildings.find(b => b.type === 'townhall');
    let placed = false;
    for (let dx = -3; dx <= 3 && !placed; dx++) {
        for (let dy = -3; dy <= 3 && !placed; dy++) {
            if (!game.units.find(u => u.x === base.x + dx && u.y === base.y + dy)) {
                game.units.push({
                    type: type,
                    x: base.x + dx,
                    y: base.y + dy,
                    hp: unit.hp,
                    maxHp: unit.hp,
                    state: 'idle',
                    gatherTarget: null,
                    gatherTimer: 0,
                    attack: unit.attack || 0,
                    range: unit.range || 1
                });
                placed = true;
            }
        }
    }
    
    updateUI();
}

function build(type) {
    const building = BUILDINGS[type];
    if (game.resources.wood < (building.cost.wood || 0) ||
        game.resources.gold < (building.cost.gold || 0) ||
        game.resources.stone < (building.cost.stone || 0)) {
        return;
    }
    
    game.resources.wood -= (building.cost.wood || 0);
    game.resources.gold -= (building.cost.gold || 0);
    game.resources.stone -= (building.cost.stone || 0);
    
    if (building.pop) {
        game.population.max += building.pop;
    }
    
    const base = game.buildings.find(b => b.type === 'townhall');
    game.buildings.push({
        type: type,
        name: building.name,
        x: base.x + Math.floor(Math.random() * 5) - 2,
        y: base.y + Math.floor(Math.random() * 5) + 2,
        hp: 200,
        icon: building.icon
    });
    
    updateUI();
    renderMap();
}

function advanceAge() {
    if (game.age >= 3) return;
    const cost = AGE_COSTS[game.age];
    if (game.resources.food < cost.food || game.resources.gold < cost.gold) return;
    
    game.resources.food -= cost.food;
    game.resources.gold -= cost.gold;
    game.age++;
    
    showEvent(`进入${AGE_NAMES[game.age]}!`);
    updateUI();
}

function researchTech(tech) {
    if (game.techs[tech]) return;
    if (tech === 'horse' && game.resources.gold < 50) return;
    if (tech === 'mining' && game.resources.gold < 50) return;
    
    if (tech === 'horse') {
        game.resources.gold -= 50;
        game.techs.horse = true;
    } else if (tech === 'mining') {
        game.resources.gold -= 50;
        game.techs.mining = true;
    }
    
    updateUI();
}

// ==================== 地图渲染 ====================
function renderMap() {
    const mapEl = document.getElementById('gameMap');
    const size = 15;
    let html = `<div style="display: grid; grid-template-columns: repeat(${size}, 28px); gap: 1px;">`;
    
    for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {
            const unit = game.units.find(u => u.x === x && u.y === y);
            const building = game.buildings.find(b => b.x === x && b.y === y);
            const isBase = x === 5 && y === 5;
            const isEnemy = x === 9 && y === 9;
            
            let content = '';
            let cls = 'map-cell';
            
            if (isBase) {
                content = '🏰';
                cls += ' player';
            } else if (isEnemy) {
                content = '🏚️';
                cls += ' enemy';
            } else if (building) {
                content = building.icon;
            } else if (unit) {
                if (unit.type === 'villager') content = '👨‍🌾';
                else if (unit.type === 'infantry') content = '🗡️';
                else if (unit.type === 'archer') content = '🏹';
                else if (unit.type === 'cavalry') content = '🐎';
            }
            
            html += `<div class="${cls}" onclick="selectCell(${x}, ${y})">${content}</div>`;
        }
    }
    
    html += '</div>';
    mapEl.innerHTML = html;
}

function selectCell(x, y) {
    const unit = game.units.find(u => u.x === x && u.y === y);
    const building = game.buildings.find(b => b.x === x && b.y === y);
    const isEnemy = x === 9 && y === 9;
    
    if (unit) {
        game.selectedUnit = unit;
        showSelection(unit);
    } else if (building) {
        game.selectedUnit = building;
        showSelection(building);
    } else if (isEnemy && game.enemyBase.hp > 0) {
        // 攻击敌人基地
        attackEnemy();
    }
}

function showSelection(obj) {
    const info = document.getElementById('selectionInfo');
    const nameEl = document.getElementById('selName');
    const statsEl = document.getElementById('selStats');
    
    info.classList.remove('hidden');
    
    if (obj.name) {
        nameEl.textContent = obj.name;
    } else if (obj.type) {
        nameEl.textContent = UNITS[obj.type]?.name || obj.type;
    }
    
    statsEl.innerHTML = `❤️ ${obj.hp}/${obj.maxHp || obj.hp}`;
}

function attackEnemy() {
    const attackers = game.units.filter(u => u.type !== 'villager');
    if (attackers.length === 0) {
        showEvent('没有军队!');
        return;
    }
    
    let damage = 0;
    attackers.forEach(a => {
        damage += a.attack || 5;
    });
    
    game.enemyBase.hp -= damage;
    showEvent(`攻击敌方基地造成 ${damage} 伤害!`);
    
    if (game.enemyBase.hp <= 0) {
        game.enemyBase.hp = 100 + game.enemyBase.level * 50;
        game.enemyBase.level++;
        game.resources.gold += 200;
        game.resources.food += 200;
        showEvent('摧毁敌方基地! 获得资源奖励!');
    }
    
    renderMap();
}

// ==================== 敌人 ====================
function spawnEnemyWave() {
    const count = Math.floor(game.wave * 1.5);
    showEvent(`第 ${game.wave} 波敌军来袭!`);
    
    // 简化的战斗结算
    const playerPower = game.units.filter(u => u.type !== 'villager').reduce((sum, u) => sum + (u.attack || 5), 0);
    const enemyPower = count * 8;
    
    if (playerPower >= enemyPower) {
        const loss = Math.floor(count * 0.2);
        // 移除部分单位
        const soldiers = game.units.filter(u => u.type !== 'villager');
        for (let i = 0; i < loss && soldiers.length > 0; i++) {
            const idx = game.units.indexOf(soldiers[Math.floor(Math.random() * soldiers.length)]);
            if (idx > -1) game.units.splice(idx, 1);
        }
        showEvent('防守成功!');
    } else {
        // 敌人获胜，扣资源
        game.resources.food = Math.max(0, game.resources.food - 100);
        game.resources.wood = Math.max(0, game.resources.wood - 100);
        showEvent('防守失败! 资源被掠夺!');
        
        if (game.resources.food < 50 && game.units.filter(u => u.type === 'villager').length === 0) {
            showPopup('失败', '文明覆灭!');
        }
    }
    
    renderMap();
    updateUI();
}

// ==================== 事件与弹窗 ====================
function showEvent(msg) {
    const toast = document.getElementById('eventToast');
    toast.textContent = msg;
    toast.classList.remove('hidden');
    setTimeout(() => toast.classList.add('hidden'), 2500);
}

function showPopup(title, desc) {
    game.screen = 'gameover';
    document.getElementById('popupTitle').textContent = title;
    document.getElementById('popupDesc').textContent = desc;
    document.getElementById('popup').classList.remove('hidden');
}

function closePopup() {
    game.screen = 'menu';
    document.getElementById('popup').classList.add('hidden');
    showMenu();
}

// ==================== 菜单 ====================
function showMenu() {
    document.getElementById('gameView').innerHTML = `
        <div class="flex flex-col items-center justify-center h-full">
            <h1 class="text-4xl font-black text-amber-500 mb-2">帝国时代 IV</h1>
            <p class="text-slate-500 mb-8">复兴版</p>
            <div class="grid grid-cols-2 gap-4 max-w-md">
                ${Object.entries(CIVS).map(([id, c]) => `
                    <div class="civ-card" onclick="initGame('${id}')">
                        <div class="text-3xl mb-2">${c.icon}</div>
                        <div class="font-bold text-amber-400">${c.name}</div>
                        <div class="text-xs text-slate-400">${c.bonus}</div>
                    </div>
                `).join('')}
            </div>
        </div>
    `;
}

// 初始化
showMenu();
</script>
